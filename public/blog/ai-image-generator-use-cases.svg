  <rect x="800" y="132" width="360" height="152" rx="14" fill="url(#pG)" stroke="rgba(244,114,182,0.18)" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="800" y="132" width="360" height="4" rx="2" fill="rgba(244,114,182,0.45)"/>
  <rect x="820" y="152" width="44" height="44" rx="10" fill="rgba(244,114,182,0.08)" stroke="rgba(244,114,182,0.18)" stroke-width="1"/>

  <text x="876" y="188" font-size="11" fill="rgba(244,114,182,0.65)">Products · Listings · Shops</text>
  <text x="820" y="216" font-size="12" fill="rgba(255,255,255,0.52)">Create product mockup images.</text>
  <text x="820" y="233" font-size="12" fill="rgba(255,255,255,0.52)">Generate lifestyle product shots.</text>
  <text x="820" y="250" font-size="12" fill="rgba(255,255,255,0.52)">Design store banners and hero images.</text>
  <text x="820" y="267" font-size="12" fill="rgba(255,255,255,0.52)">Launch new products faster.</text>

  <!-- Game Designers -->
  <rect x="40" y="302" width="360" height="152" rx="14" fill="url(#pG)" stroke="rgba(251,191,36,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="40" y="302" width="360" height="4" rx="2" fill="rgba(251,191,36,0.45)"/>
  <rect x="60" y="322" width="44" height="44" rx="10" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.18)" stroke-width="1"/>

  <rect x="420" y="132" width="360" height="152" rx="14" fill="url(#pG)" stroke="rgba(96,165,250,0.2)" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="420" y="132" width="360" height="4" rx="2" fill="rgba(96,165,250,0.5)"/>
  <rect x="440" y="152" width="44" height="44" rx="10" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="462" y="180" text-anchor="middle" font-size="22">📣</text>
  <text x="496" y="170" font-size="15" font-weight="700" fill="#f0e8ff">Marketers &amp; Advertisers</text>
  <text x="496" y="188" font-size="11" fill="rgba(96,165,250,0.65)">Ads · Campaigns · Brand</text>
  <text x="440" y="216" font-size="12" fill="rgba(255,255,255,0.52)">Produce ad creatives at scale.</text>
  <text x="440" y="233" font-size="12" fill="rgba(255,255,255,0.52)">A/B test visuals without a studio.</text>
  <text x="440" y="250" font-size="12" fill="rgba(255,255,255,0.52)">Generate on-brand imagery instantly.</text>
  <text x="440" y="267" font-size="12" fill="rgba(255,255,255,0.52)">Cut creative production costs.</text>


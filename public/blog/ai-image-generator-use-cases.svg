  <text x="820" y="403" font-size="12" fill="rgba(255,255,255,0.52)">Generate mood boards instantly.</text>
  <text x="820" y="420" font-size="12" fill="rgba(255,255,255,0.52)">Create exterior render inspiration.</text>
  <text x="820" y="437" font-size="12" fill="rgba(255,255,255,0.52)">Present ideas before full CAD work.</text>

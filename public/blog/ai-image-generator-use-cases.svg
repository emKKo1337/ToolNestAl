  <text x="60" y="386" font-size="12" fill="rgba(255,255,255,0.52)">Concept characters and environments.</text>
  <text x="60" y="403" font-size="12" fill="rgba(255,255,255,0.52)">Generate game asset ideas quickly.</text>
  <text x="60" y="420" font-size="12" fill="rgba(255,255,255,0.52)">Create lore illustrations and covers.</text>
  <text x="60" y="437" font-size="12" fill="rgba(255,255,255,0.52)">Prototype visual style fast.</text>

  <!-- Authors & Publishers -->
  <rect x="420" y="302" width="360" height="152" rx="14" fill="url(#pG)" stroke="rgba(34,197,94,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="420" y="302" width="360" height="4" rx="2" fill="rgba(34,197,94,0.4)"/>
  <rect x="440" y="322" width="44" height="44" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.18)" stroke-width="1"/>
  <text x="462" y="350" text-anchor="middle" font-size="22">📚</text>
  <text x="496" y="340" font-size="15" font-weight="700" fill="#f0e8ff">Authors &amp; Publishers</text>
  <text x="496" y="358" font-size="11" fill="rgba(34,197,94,0.65)">Covers · Illustrations · Blogs</text>
  <text x="440" y="386" font-size="12" fill="rgba(255,255,255,0.52)">Design book covers independently.</text>
  <text x="440" y="403" font-size="12" fill="rgba(255,255,255,0.52)">Create blog post featured images.</text>
  <text x="440" y="420" font-size="12" fill="rgba(255,255,255,0.52)">Illustrate scenes without an artist.</text>
  <text x="440" y="437" font-size="12" fill="rgba(255,255,255,0.52)">Generate newsletter headers fast.</text>

  <!-- Architects & Designers -->
  <rect x="800" y="302" width="360" height="152" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.14)" stroke-width="1" filter="url(#sh)"/>
  <rect x="800" y="302" width="360" height="4" rx="2" fill="rgba(167,139,250,0.4)"/>
  <rect x="820" y="322" width="44" height="44" rx="10" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.18)" stroke-width="1"/>
  <text x="842" y="350" text-anchor="middle" font-size="22">🏛</text>
  <text x="876" y="340" font-size="15" font-weight="700" fill="#f0e8ff">Architects &amp; Designers</text>

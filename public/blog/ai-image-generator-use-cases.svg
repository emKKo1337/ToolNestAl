  <text x="116" y="188" font-size="11" fill="rgba(167,139,250,0.65)">Social · YouTube · Reels</text>
  <text x="60" y="216" font-size="12" fill="rgba(255,255,255,0.52)">Create thumbnails that get clicks.</text>
  <text x="60" y="233" font-size="12" fill="rgba(255,255,255,0.52)">Generate cover art and channel banners.</text>
  <text x="60" y="250" font-size="12" fill="rgba(255,255,255,0.52)">Make unique social media visuals daily.</text>
  <text x="60" y="267" font-size="12" fill="rgba(255,255,255,0.52)">No photographer or designer needed.</text>


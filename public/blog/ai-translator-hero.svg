  <circle cx="600" cy="380" r="62" fill="none" stroke="rgba(167,139,250,0.22)" stroke-width="1.5" stroke-dasharray="7 5"/>
  <circle cx="600" cy="380" r="74" fill="none" stroke="rgba(167,139,250,0.1)" stroke-width="1" stroke-dasharray="4 8"/>
  <text x="600" y="388" text-anchor="middle" font-size="28" font-weight="800" fill="#fff">⇄</text>


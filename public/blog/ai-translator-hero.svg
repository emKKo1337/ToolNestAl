    <rect x="166" y="561" width="56" height="22" rx="11" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.22)" stroke-width="1"/>
    <text x="194" y="576" text-anchor="middle" fill="#c4b5fd">French</text>
    <rect x="230" y="561" width="64" height="22" rx="11" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
    <text x="262" y="576" text-anchor="middle" fill="rgba(255,255,255,0.42)">Spanish</text>
    <rect x="302" y="561" width="60" height="22" rx="11" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
    <text x="332" y="576" text-anchor="middle" fill="rgba(255,255,255,0.42)">German</text>
    <rect x="370" y="561" width="64" height="22" rx="11" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
    <text x="402" y="576" text-anchor="middle" fill="rgba(255,255,255,0.42)">Chinese</text>
    <rect x="442" y="561" width="66" height="22" rx="11" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
    <text x="475" y="576" text-anchor="middle" fill="rgba(255,255,255,0.42)">Japanese</text>
    <text x="518" y="576" fill="rgba(255,255,255,0.28)">+ 95 more</text>

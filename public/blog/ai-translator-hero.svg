  <!-- translated text lines -->
  <text x="686" y="294" font-size="12" fill="rgba(167,139,250,0.85)">Bonjour ! Comment allez-vous aujourd'hui ?</text>
  <text x="686" y="314" font-size="12" fill="rgba(167,139,250,0.75)">Nous sommes ravis d'annoncer</text>
  <text x="686" y="334" font-size="12" fill="rgba(167,139,250,0.75)">le lancement de notre nouveau produit.</text>
  <text x="686" y="354" font-size="12" fill="rgba(167,139,250,0.65)">Restez à l'écoute pour plus de mises</text>
  <text x="686" y="374" font-size="12" fill="rgba(167,139,250,0.55)">à jour et fonctionnalités passionnantes !</text>
  <!-- icons -->
  <text x="1032" y="510" font-size="16" fill="rgba(167,139,250,0.55)">🔊</text>
  <text x="1060" y="510" font-size="16" fill="rgba(167,139,250,0.55)">⧉</text>
  <text x="1088" y="510" font-size="16" fill="rgba(167,139,250,0.55)">⬇</text>


    <circle cx="80" cy="240" r="1.5"/><circle cx="240" cy="240" r="1.5"/><circle cx="400" cy="240" r="1.5"/><circle cx="560" cy="240" r="1.5"/><circle cx="720" cy="240" r="1.5"/><circle cx="880" cy="240" r="1.5"/><circle cx="1040" cy="240" r="1.5"/><circle cx="1160" cy="240" r="1.5"/>
    <circle cx="80" cy="540" r="1.5"/><circle cx="240" cy="540" r="1.5"/><circle cx="400" cy="540" r="1.5"/><circle cx="560" cy="540" r="1.5"/><circle cx="720" cy="540" r="1.5"/><circle cx="880" cy="540" r="1.5"/><circle cx="1040" cy="540" r="1.5"/><circle cx="1160" cy="540" r="1.5"/>

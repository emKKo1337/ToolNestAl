  <rect x="790" y="559" width="320" height="36" rx="18" fill="url(#bG)" filter="url(#sh)"/>
  <text x="950" y="582" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">✦ Translate Now — Free</text>

  <!-- floating icons top -->
  <rect x="620" y="44" width="50" height="50" rx="12" fill="rgba(91,33,182,0.2)" stroke="rgba(91,33,182,0.4)" stroke-width="1.5"/>
  <text x="645" y="75" text-anchor="middle" font-size="22" fill="#a78bfa">A↔</text>
  <rect x="726" y="34" width="48" height="48" rx="12" fill="rgba(37,99,235,0.14)" stroke="rgba(96,165,250,0.3)" stroke-width="1.5"/>
  <text x="750" y="64" text-anchor="middle" font-size="20" fill="#60a5fa">🌐</text>
  <rect x="830" y="44" width="50" height="50" rx="12" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.22)" stroke-width="1.5"/>
  <text x="855" y="75" text-anchor="middle" font-size="22" fill="#c4b5fd">≡</text>

  <text x="600" y="634" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.2)">toolnestai.net — AI Translator — Free · 100+ Languages · No Sign-Up</text>

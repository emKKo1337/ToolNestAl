  <rect x="668" y="224" width="482" height="310" rx="16" fill="url(#pG)" stroke="rgba(167,139,250,0.22)" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="668" y="224" width="482" height="4" rx="2" fill="url(#aG)"/>

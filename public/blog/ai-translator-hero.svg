  <text x="416" y="510" font-size="16" fill="rgba(255,255,255,0.38)">🔊</text>
  <text x="442" y="510" font-size="16" fill="rgba(255,255,255,0.38)">🎤</text>
  <text x="466" y="510" font-size="16" fill="rgba(255,255,255,0.38)">⧉</text>


  <!-- text lines in source -->
  <text x="72" y="294" font-size="12.5" fill="rgba(255,255,255,0.72)">Hello! How are you today?</text>
  <text x="72" y="314" font-size="12.5" fill="rgba(255,255,255,0.62)">We're excited to announce our new</text>
  <text x="72" y="334" font-size="12.5" fill="rgba(255,255,255,0.62)">product launch. Stay tuned for more</text>
  <text x="72" y="354" font-size="12.5" fill="rgba(255,255,255,0.55)">updates and exciting features!</text>

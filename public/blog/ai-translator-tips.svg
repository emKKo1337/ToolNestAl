<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%"><stop offset="0%" stop-color="#0a0618"/><stop offset="100%" stop-color="#07070f"/></radialGradient>
    <radialGradient id="gC" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="#5b21b6" stop-opacity="0.26"/><stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="bG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#130b2e" stop-opacity="0.97"/><stop offset="100%" stop-color="#0c0820" stop-opacity="0.97"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#5b21b6" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <ellipse cx="600" cy="250" rx="700" ry="380" fill="url(#gC)"/>

  <text x="600" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#a78bfa" letter-spacing="2">BEST PRACTICES</text>
  <text x="600" y="88" text-anchor="middle" font-size="32" font-weight="800" fill="url(#aG)">Get Better Translations Every Time</text>
  <text x="600" y="116" text-anchor="middle" font-size="15" fill="rgba(255,255,255,0.42)">Six practices that improve output quality significantly</text>

  <!-- 6 tip cards: 3 per row -->
  <!-- Row 1 -->
  <rect x="40" y="138" width="360" height="148" rx="14" fill="url(#pG)" stroke="url(#aG)" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="40" y="138" width="360" height="4" rx="2" fill="url(#aG)"/>
  <rect x="60" y="158" width="44" height="44" rx="10" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <text x="82" y="186" text-anchor="middle" font-size="22" fill="#a78bfa">✎</text>
  <text x="116" y="176" font-size="14" font-weight="700" fill="#f0e8ff">Write in clear sentences</text>
  <text x="116" y="194" font-size="11" fill="rgba(167,139,250,0.65)">Input quality = output quality</text>
  <text x="60" y="222" font-size="12" fill="rgba(255,255,255,0.52)">Avoid slang, abbreviations and</text>
  <text x="60" y="239" font-size="12" fill="rgba(255,255,255,0.52)">incomplete sentences. Complete</text>
  <text x="60" y="256" font-size="12" fill="rgba(255,255,255,0.52)">grammatical units translate best.</text>
  <rect x="60" y="264" width="40" height="4" rx="2" fill="url(#aG)" opacity="0.5"/>

  <rect x="420" y="138" width="360" height="148" rx="14" fill="url(#pG)" stroke="rgba(96,165,250,0.2)" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="420" y="138" width="360" height="4" rx="2" fill="rgba(96,165,250,0.5)"/>
  <rect x="440" y="158" width="44" height="44" rx="10" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.22)" stroke-width="1"/>
  <text x="462" y="186" text-anchor="middle" font-size="22" fill="#60a5fa">⊡</text>
  <text x="496" y="176" font-size="14" font-weight="700" fill="#f0e8ff">Use the Detect Language</text>
  <text x="496" y="194" font-size="11" fill="rgba(96,165,250,0.65)">Auto-detection saves time</text>
  <text x="440" y="222" font-size="12" fill="rgba(255,255,255,0.52)">Let AI identify the source language</text>
  <text x="440" y="239" font-size="12" fill="rgba(255,255,255,0.52)">automatically — saves steps and</text>
  <text x="440" y="256" font-size="12" fill="rgba(255,255,255,0.52)">works on mixed-language content.</text>
  <rect x="440" y="264" width="40" height="4" rx="2" fill="rgba(96,165,250,0.5)"/>

  <rect x="800" y="138" width="360" height="148" rx="14" fill="url(#pG)" stroke="rgba(244,114,182,0.18)" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="800" y="138" width="360" height="4" rx="2" fill="rgba(244,114,182,0.45)"/>
  <rect x="820" y="158" width="44" height="44" rx="10" fill="rgba(244,114,182,0.08)" stroke="rgba(244,114,182,0.18)" stroke-width="1"/>
  <text x="842" y="186" text-anchor="middle" font-size="22" fill="#f472b6">≡</text>
  <text x="876" y="176" font-size="14" font-weight="700" fill="#f0e8ff">Translate in sections</text>
  <text x="876" y="194" font-size="11" fill="rgba(244,114,182,0.65)">Control over each part</text>
  <text x="820" y="222" font-size="12" fill="rgba(255,255,255,0.52)">For long documents, translate</text>
  <text x="820" y="239" font-size="12" fill="rgba(255,255,255,0.52)">section by section. Review each</text>
  <text x="820" y="256" font-size="12" fill="rgba(255,255,255,0.52)">block before moving on.</text>
  <rect x="820" y="264" width="40" height="4" rx="2" fill="rgba(244,114,182,0.45)"/>

  <!-- Row 2 -->
  <rect x="40" y="300" width="360" height="148" rx="14" fill="url(#pG)" stroke="rgba(34,197,94,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="40" y="300" width="360" height="4" rx="2" fill="rgba(34,197,94,0.45)"/>
  <rect x="60" y="320" width="44" height="44" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.18)" stroke-width="1"/>
  <text x="82" y="348" text-anchor="middle" font-size="22" fill="#22c55e">✓</text>
  <text x="116" y="338" font-size="14" font-weight="700" fill="#f0e8ff">Review for context</text>
  <text x="116" y="356" font-size="11" fill="rgba(34,197,94,0.65)">You hold domain knowledge</text>
  <text x="60" y="384" font-size="12" fill="rgba(255,255,255,0.52)">AI translates meaning accurately</text>
  <text x="60" y="401" font-size="12" fill="rgba(255,255,255,0.52)">but you know your brand voice,</text>
  <text x="60" y="418" font-size="12" fill="rgba(255,255,255,0.52)">industry terms and audience.</text>
  <rect x="60" y="426" width="40" height="4" rx="2" fill="rgba(34,197,94,0.45)"/>

  <rect x="420" y="300" width="360" height="148" rx="14" fill="url(#pG)" stroke="rgba(251,191,36,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="420" y="300" width="360" height="4" rx="2" fill="rgba(251,191,36,0.45)"/>
  <rect x="440" y="320" width="44" height="44" rx="10" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.18)" stroke-width="1"/>
  <text x="462" y="348" text-anchor="middle" font-size="22" fill="#fbbf24">⚡</text>
  <text x="496" y="338" font-size="14" font-weight="700" fill="#f0e8ff">Use the Copy button</text>
  <text x="496" y="356" font-size="11" fill="rgba(251,191,36,0.65)">One click to clipboard</text>
  <text x="440" y="384" font-size="12" fill="rgba(255,255,255,0.52)">Don't manually select text.</text>
  <text x="440" y="401" font-size="12" fill="rgba(255,255,255,0.52)">The Copy button captures the</text>
  <text x="440" y="418" font-size="12" fill="rgba(255,255,255,0.52)">full output in one click.</text>
  <rect x="440" y="426" width="40" height="4" rx="2" fill="rgba(251,191,36,0.45)"/>

  <rect x="800" y="300" width="360" height="148" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.14)" stroke-width="1" filter="url(#sh)"/>
  <rect x="800" y="300" width="360" height="4" rx="2" fill="rgba(167,139,250,0.4)"/>
  <rect x="820" y="320" width="44" height="44" rx="10" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.18)" stroke-width="1"/>
  <text x="842" y="348" text-anchor="middle" font-size="22" fill="#c4b5fd">🔄</text>
  <text x="876" y="338" font-size="14" font-weight="700" fill="#f0e8ff">Retranslate freely</text>
  <text x="876" y="356" font-size="11" fill="rgba(167,139,250,0.65)">Instant regeneration</text>
  <text x="820" y="384" font-size="12" fill="rgba(255,255,255,0.52)">Not quite right? Hit Translate</text>
  <text x="820" y="401" font-size="12" fill="rgba(255,255,255,0.52)">again. The AI produces a fresh</text>
  <text x="820" y="418" font-size="12" fill="rgba(255,255,255,0.52)">version each time — instantly.</text>
  <rect x="820" y="426" width="40" height="4" rx="2" fill="rgba(167,139,250,0.4)"/>
</svg>

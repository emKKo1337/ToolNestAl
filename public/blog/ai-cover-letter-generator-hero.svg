  <text x="682" y="244" font-size="9" fill="rgba(255,255,255,0.5)">In my current role, I have developed and maintained dynamic web applications using</text>
  <text x="682" y="257" font-size="9" fill="rgba(255,255,255,0.5)">JavaScript, React, Node.js, and SQL. I enjoy solving complex problems, collaborating</text>
  <text x="682" y="270" font-size="9" fill="rgba(255,255,255,0.5)">with cross-functional teams, and delivering high-quality solutions.</text>
  <text x="682" y="290" font-size="9" fill="rgba(255,255,255,0.5)">I am particularly drawn to TechNova Solutions because of your commitment to</text>

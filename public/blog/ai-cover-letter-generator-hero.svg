  <text x="682" y="198" font-size="9" fill="rgba(255,255,255,0.5)">I am writing to express my interest in the Software Developer position at TechNova</text>
  <text x="682" y="211" font-size="9" fill="rgba(255,255,255,0.5)">Solutions. With a strong background in full-stack development and a passion for building</text>

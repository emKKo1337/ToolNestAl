  <text x="46" y="264" font-size="9" fill="rgba(255,255,255,0.5)">Wireless Bluetooth Headphones</text>
  <text x="46" y="278" font-size="9" fill="rgba(255,255,255,0.5)">— Premium Sound, All-Day</text>
  <text x="46" y="292" font-size="9" fill="rgba(255,255,255,0.5)">Comfort. Designed for those</text>
  <text x="46" y="306" font-size="9" fill="rgba(255,255,255,0.5)">who live the music...</text>

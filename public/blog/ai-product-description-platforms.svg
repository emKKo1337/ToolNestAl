  <text x="46" y="200" font-size="10" font-weight="600" fill="rgba(255,255,255,0.6)">Focus:</text><text x="88" y="200" font-size="10" fill="rgba(255,255,255,0.45)">Brand story + emotion</text>
  <text x="46" y="216" font-size="10" font-weight="600" fill="rgba(255,255,255,0.6)">Length:</text><text x="96" y="216" font-size="10" fill="rgba(255,255,255,0.45)">150–300 words</text>

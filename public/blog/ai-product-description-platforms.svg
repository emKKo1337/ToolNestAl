  <text x="958" y="278" font-size="9" fill="rgba(255,255,255,0.5)">Headphones | ANC | 40H |</text>
  <text x="958" y="292" font-size="9" fill="rgba(255,255,255,0.5)">Foldable | Fast Ship | UK</text>
  <text x="958" y="306" font-size="9" fill="rgba(255,255,255,0.5)">Stock | Money-back...</text>

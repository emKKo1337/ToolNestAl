<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%"><stop offset="0%" stop-color="#0e0820"/><stop offset="100%" stop-color="#08080f"/></radialGradient>
    <radialGradient id="gL" cx="30%" cy="50%" r="50%"><stop offset="0%" stop-color="#5b21b6" stop-opacity="0.25"/><stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/></radialGradient>
    <radialGradient id="gR" cx="70%" cy="50%" r="50%"><stop offset="0%" stop-color="#2563eb" stop-opacity="0.16"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="bG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1a0e38" stop-opacity="0.97"/><stop offset="100%" stop-color="#0c0820" stop-opacity="0.97"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#5b21b6" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <ellipse cx="360" cy="250" rx="500" ry="380" fill="url(#gL)"/>
  <ellipse cx="840" cy="250" rx="500" ry="380" fill="url(#gR)"/>

  <text x="600" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#a78bfa" letter-spacing="2">USE CASES</text>
  <text x="600" y="88" text-anchor="middle" font-size="32" font-weight="800" fill="url(#aG)">Who Uses an AI Paraphrasing Tool?</text>
  <text x="600" y="116" text-anchor="middle" font-size="15" fill="rgba(255,255,255,0.42)">From students to marketers — anyone who works with text</text>

  <!-- 6 use-case cards: 3 per row -->
  <!-- Row 1 -->
  <!-- Students -->
  <rect x="40" y="140" width="356" height="150" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="40" y="140" width="356" height="4" rx="2" fill="url(#aG)"/>
  <rect x="60" y="160" width="44" height="44" rx="10" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.22)" stroke-width="1"/>
  <text x="82" y="188" text-anchor="middle" font-size="22" fill="#a78bfa">🎓</text>
  <text x="116" y="180" font-size="15" font-weight="700" fill="#f0e8ff">Students</text>
  <text x="116" y="198" font-size="11" fill="rgba(167,139,250,0.65)">Avoid plagiarism · Rephrase sources</text>
  <text x="60" y="225" font-size="12" fill="rgba(255,255,255,0.5)">Rewrite cited material in your own words.</text>
  <text x="60" y="242" font-size="12" fill="rgba(255,255,255,0.5)">Improve essay clarity and readability.</text>
  <text x="60" y="259" font-size="12" fill="rgba(255,255,255,0.5)">Polish rough drafts before submission.</text>

  <!-- Content Creators -->
  <rect x="422" y="140" width="356" height="150" rx="14" fill="url(#pG)" stroke="rgba(96,165,250,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="422" y="140" width="356" height="4" rx="2" fill="rgba(96,165,250,0.5)"/>
  <rect x="442" y="160" width="44" height="44" rx="10" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="464" y="188" text-anchor="middle" font-size="22" fill="#60a5fa">✎</text>
  <text x="498" y="180" font-size="15" font-weight="700" fill="#f0e8ff">Content Creators</text>
  <text x="498" y="198" font-size="11" fill="rgba(96,165,250,0.65)">Fresh angles · Beat writer's block</text>
  <text x="442" y="225" font-size="12" fill="rgba(255,255,255,0.5)">Repurpose articles across platforms.</text>
  <text x="442" y="242" font-size="12" fill="rgba(255,255,255,0.5)">Rewrite competitor content uniquely.</text>
  <text x="442" y="259" font-size="12" fill="rgba(255,255,255,0.5)">Refresh old posts for SEO.</text>

  <!-- Marketers -->
  <rect x="804" y="140" width="356" height="150" rx="14" fill="url(#pG)" stroke="rgba(244,114,182,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="804" y="140" width="356" height="4" rx="2" fill="rgba(244,114,182,0.45)"/>
  <rect x="824" y="160" width="44" height="44" rx="10" fill="rgba(244,114,182,0.08)" stroke="rgba(244,114,182,0.18)" stroke-width="1"/>
  <text x="846" y="188" text-anchor="middle" font-size="22" fill="#f472b6">📢</text>
  <text x="880" y="180" font-size="15" font-weight="700" fill="#f0e8ff">Marketers</text>
  <text x="880" y="198" font-size="11" fill="rgba(244,114,182,0.65)">Ad copy · Campaign variations</text>
  <text x="824" y="225" font-size="12" fill="rgba(255,255,255,0.5)">Generate ad copy variations instantly.</text>
  <text x="824" y="242" font-size="12" fill="rgba(255,255,255,0.5)">A/B test different phrasings.</text>
  <text x="824" y="259" font-size="12" fill="rgba(255,255,255,0.5)">Adapt brand voice to each channel.</text>

  <!-- Row 2 -->
  <!-- Non-Native Speakers -->
  <rect x="40" y="310" width="356" height="150" rx="14" fill="url(#pG)" stroke="rgba(34,197,94,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="40" y="310" width="356" height="4" rx="2" fill="rgba(34,197,94,0.45)"/>
  <rect x="60" y="330" width="44" height="44" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.18)" stroke-width="1"/>
  <text x="82" y="358" text-anchor="middle" font-size="22" fill="#22c55e">🌐</text>
  <text x="116" y="350" font-size="15" font-weight="700" fill="#f0e8ff">Non-Native Speakers</text>
  <text x="116" y="368" font-size="11" fill="rgba(34,197,94,0.65)">Natural English · Fluid phrasing</text>
  <text x="60" y="395" font-size="12" fill="rgba(255,255,255,0.5)">Turn translated text into natural English.</text>
  <text x="60" y="412" font-size="12" fill="rgba(255,255,255,0.5)">Fix awkward phrasing automatically.</text>
  <text x="60" y="429" font-size="12" fill="rgba(255,255,255,0.5)">Write professionally in any language.</text>

  <!-- SEO Writers -->
  <rect x="422" y="310" width="356" height="150" rx="14" fill="url(#pG)" stroke="rgba(251,191,36,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="422" y="310" width="356" height="4" rx="2" fill="rgba(251,191,36,0.45)"/>
  <rect x="442" y="330" width="44" height="44" rx="10" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.18)" stroke-width="1"/>
  <text x="464" y="358" text-anchor="middle" font-size="22" fill="#fbbf24">🔍</text>
  <text x="498" y="350" font-size="15" font-weight="700" fill="#f0e8ff">SEO Writers</text>
  <text x="498" y="368" font-size="11" fill="rgba(251,191,36,0.65)">Unique content · Higher rankings</text>
  <text x="442" y="395" font-size="12" fill="rgba(255,255,255,0.5)">Avoid duplicate content penalties.</text>
  <text x="442" y="412" font-size="12" fill="rgba(255,255,255,0.5)">Produce unique article variations.</text>
  <text x="442" y="429" font-size="12" fill="rgba(255,255,255,0.5)">Rephrase product descriptions.</text>

  <!-- Business Professionals -->
  <rect x="804" y="310" width="356" height="150" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.14)" stroke-width="1" filter="url(#sh)"/>
  <rect x="804" y="310" width="356" height="4" rx="2" fill="rgba(167,139,250,0.4)"/>
  <rect x="824" y="330" width="44" height="44" rx="10" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.18)" stroke-width="1"/>
  <text x="846" y="358" text-anchor="middle" font-size="22" fill="#c4b5fd">💼</text>
  <text x="880" y="350" font-size="15" font-weight="700" fill="#f0e8ff">Business Professionals</text>
  <text x="880" y="368" font-size="11" fill="rgba(167,139,250,0.65)">Reports · Proposals · Emails</text>
  <text x="824" y="395" font-size="12" fill="rgba(255,255,255,0.5)">Rewrite reports in formal language.</text>
  <text x="824" y="412" font-size="12" fill="rgba(255,255,255,0.5)">Sharpen proposals and pitches.</text>
  <text x="824" y="429" font-size="12" fill="rgba(255,255,255,0.5)">Eliminate jargon from internal docs.</text>
</svg>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="130" cy="315" rx="460" ry="380" fill="url(#gL)"/>
  <ellipse cx="1070" cy="315" rx="430" ry="360" fill="url(#gR)"/>


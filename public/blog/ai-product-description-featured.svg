    <text x="774" y="315" fill="#4ade80">✓</text><text x="790" y="315"><tspan font-weight="600">Ultra Comfort Fit</tspan> – Soft cushions and adjustable band</text>
    <text x="774" y="330" fill="#4ade80">✓</text><text x="790" y="330"><tspan font-weight="600">Built-in Microphone</tspan> – Clear calls and voice access</text>
    <text x="774" y="345" fill="#4ade80">✓</text><text x="790" y="345"><tspan font-weight="600">Foldable &amp; Lightweight</tspan> – Easy to carry anywhere</text>

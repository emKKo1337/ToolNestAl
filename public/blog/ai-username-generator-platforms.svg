  <text x="42" y="168" font-size="9" fill="rgba(255,255,255,0.4)">Trendy · Aesthetic · Visual</text>
  <g font-size="9" fill="rgba(255,255,255,0.55)">
    <text x="42" y="190">✦ AestheticNova</text>
    <text x="42" y="207">✦ GoldenVibesOnly</text>
    <text x="42" y="224">✦ SoftLuxeLife</text>

    <rect x="660" y="236" width="480" height="36" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="680" y="259" fill="rgba(255,255,255,0.55)">💰  Cost</text><text x="1120" y="259" text-anchor="end" fill="#4ade80">Free to start, no subs needed</text>

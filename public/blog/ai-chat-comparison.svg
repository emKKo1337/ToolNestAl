    <text x="680" y="301" fill="rgba(255,255,255,0.55)">📄  File upload</text><text x="1120" y="301" text-anchor="end" fill="#4ade80">PDFs, docs, images — free</text>
    <rect x="660" y="320" width="480" height="36" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="680" y="343" fill="rgba(255,255,255,0.55)">🔒  Privacy</text><text x="1120" y="343" text-anchor="end" fill="#4ade80">Encrypted &amp; private</text>
    <rect x="660" y="362" width="480" height="36" rx="8" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
    <text x="680" y="385" fill="rgba(255,255,255,0.55)">🔀  Switch models</text><text x="1120" y="385" text-anchor="end" fill="#4ade80">One click in same interface</text>
    <rect x="660" y="404" width="480" height="36" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="680" y="427" fill="rgba(255,255,255,0.55)">🧰  Extra tools</text><text x="1120" y="427" text-anchor="end" fill="#4ade80">200+ tools on ToolNest AI</text>

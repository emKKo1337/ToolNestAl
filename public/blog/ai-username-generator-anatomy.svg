  <rect x="946" y="196" width="200" height="112" rx="12" fill="url(#pG)" stroke="rgba(251,191,36,0.18)" stroke-width="1" filter="url(#sh)"/>
  <rect x="946" y="196" width="4" height="112" rx="2" fill="#fde68a"/>
  <text x="960" y="220" font-size="18">🎯</text>
  <text x="986" y="218" font-size="11" font-weight="700" fill="#fde68a">Niche Relevant</text>
  <text x="960" y="236" font-size="9" fill="rgba(255,255,255,0.5)">Hints at your niche</text>
  <text x="960" y="251" font-size="9" fill="rgba(255,255,255,0.5)">without boxing you in</text>
  <text x="960" y="266" font-size="9" fill="rgba(255,255,255,0.5)">if you expand later.</text>
  <text x="960" y="284" font-size="8" fill="rgba(255,255,255,0.28)">✓ VortexWolf — gaming</text>
  <text x="960" y="298" font-size="8" fill="rgba(255,255,255,0.28)">but not too literal</text>

  <!-- BL card: Emotionally resonant -->
  <rect x="104" y="310" width="190" height="112" rx="12" fill="url(#pG)" stroke="rgba(239,68,68,0.18)" stroke-width="1" filter="url(#sh)"/>
  <rect x="104" y="310" width="4" height="112" rx="2" fill="#fca5a5"/>
  <text x="118" y="334" font-size="18">⚡</text>
  <text x="144" y="332" font-size="11" font-weight="700" fill="#fca5a5">Feels Like Something</text>
  <text x="118" y="350" font-size="9" fill="rgba(255,255,255,0.5)">Evokes speed, power,</text>
  <text x="118" y="365" font-size="9" fill="rgba(255,255,255,0.5)">mystery or energy.</text>
  <text x="118" y="380" font-size="9" fill="rgba(255,255,255,0.5)">Neutral names are</text>
  <text x="118" y="395" font-size="9" fill="rgba(255,255,255,0.5)">forgettable.</text>
  <text x="118" y="413" font-size="8" fill="rgba(255,255,255,0.28)">✓ DarkNebula — vivid</text>

  <!-- BR card: Consistent across platforms -->
  <rect x="906" y="310" width="190" height="112" rx="12" fill="url(#pG)" stroke="rgba(124,58,237,0.2)" stroke-width="1" filter="url(#sh)"/>
  <rect x="906" y="310" width="4" height="112" rx="2" fill="#c4b5fd"/>
  <text x="920" y="334" font-size="18">🔗</text>
  <text x="946" y="332" font-size="11" font-weight="700" fill="#c4b5fd">Cross-Platform</text>
  <text x="920" y="350" font-size="9" fill="rgba(255,255,255,0.5)">Same or very similar</text>
  <text x="920" y="365" font-size="9" fill="rgba(255,255,255,0.5)">handle everywhere so</text>
  <text x="920" y="380" font-size="9" fill="rgba(255,255,255,0.5)">followers can find you.</text>
  <text x="920" y="398" font-size="8" fill="rgba(255,255,255,0.28)">✓ NightWolf_7 across</text>
  <text x="920" y="412" font-size="8" fill="rgba(255,255,255,0.28)">all major platforms</text>

  <text x="600" y="488" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.22)">ToolNest AI · toolnestai.net/ai-tools/ai-username-generator</text>
</svg>

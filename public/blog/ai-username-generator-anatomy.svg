  <text x="68" y="266" font-size="9" fill="rgba(255,255,255,0.5)">your target platforms.</text>
  <text x="68" y="284" font-size="8" fill="rgba(255,255,255,0.28)">AI checks this for you</text>
  <text x="68" y="298" font-size="8" fill="rgba(255,255,255,0.28)">across all platforms</text>


  <rect x="275" y="28" width="350" height="38" rx="19" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <text x="450" y="52" text-anchor="middle" font-size="14" font-weight="600" fill="#a78bfa">✦ ToolNest AI — 2026 Guide</text>
  <text x="450" y="112" text-anchor="middle" font-size="34" font-weight="800" fill="url(#aG)" filter="url(#gF)">AI Prompt Generator</text>
  <text x="450" y="144" text-anchor="middle" font-size="17" fill="rgba(255,255,255,0.48)">The Complete 2026 Cheat Sheet</text>
  <line x1="80" y1="164" x2="820" y2="164" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>


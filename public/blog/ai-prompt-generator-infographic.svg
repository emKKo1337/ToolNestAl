  <rect x="55" y="180" width="245" height="118" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.2)" stroke-width="1" filter="url(#sh)"/>
  <text x="177" y="232" text-anchor="middle" font-size="38" font-weight="800" fill="#a78bfa">10×</text>
  <text x="177" y="258" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">better AI output with</text>
  <text x="177" y="274" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">well-crafted prompts</text>
  <rect x="55" y="294" width="245" height="4" rx="2" fill="rgba(167,139,250,0.4)"/>

  <rect x="327" y="180" width="246" height="118" rx="14" fill="url(#pG)" stroke="rgba(96,165,250,0.15)" stroke-width="1" filter="url(#sh)"/>
  <text x="450" y="232" text-anchor="middle" font-size="38" font-weight="800" fill="#60a5fa">&lt;10s</text>
  <text x="450" y="258" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">to generate a complete</text>
  <text x="450" y="274" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">optimized prompt</text>
  <rect x="327" y="294" width="246" height="4" rx="2" fill="rgba(96,165,250,0.4)"/>

  <rect x="600" y="180" width="245" height="118" rx="14" fill="url(#pG)" stroke="rgba(34,197,94,0.15)" stroke-width="1" filter="url(#sh)"/>
  <text x="722" y="232" text-anchor="middle" font-size="38" font-weight="800" fill="#22c55e">Free</text>
  <text x="722" y="258" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">Unlimited prompts,</text>
  <text x="722" y="274" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">no account required</text>
  <rect x="600" y="294" width="245" height="4" rx="2" fill="rgba(34,197,94,0.4)"/>

  <!-- STEP BY STEP -->
  <text x="450" y="358" text-anchor="middle" font-size="20" font-weight="700" fill="#f0e8ff">Generate a Perfect Prompt in 4 Steps</text>
  <line x1="150" y1="374" x2="750" y2="374" stroke="rgba(167,139,250,0.08)" stroke-width="1"/>

  <rect x="55" y="388" width="790" height="54" rx="10" fill="url(#pG)" stroke="rgba(167,139,250,0.1)" stroke-width="1" filter="url(#sh)"/>
  <circle cx="92" cy="415" r="18" fill="url(#bG)"/>
  <text x="92" y="420" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">1</text>
  <text x="122" y="410" font-size="13" font-weight="600" fill="rgba(255,255,255,0.8)">Describe your goal</text>
  <text x="122" y="428" font-size="12" fill="rgba(255,255,255,0.42)">Tell the generator what you want the AI to produce — be specific about the task</text>

  <rect x="55" y="450" width="790" height="54" rx="10" fill="url(#pG)" stroke="rgba(96,165,250,0.1)" stroke-width="1" filter="url(#sh)"/>
  <circle cx="92" cy="477" r="18" fill="rgba(96,165,250,0.25)" stroke="rgba(96,165,250,0.5)" stroke-width="1.5"/>
  <text x="92" y="482" text-anchor="middle" font-size="14" font-weight="800" fill="#60a5fa">2</text>
  <text x="122" y="472" font-size="13" font-weight="600" fill="rgba(255,255,255,0.8)">Choose your AI model</text>
  <text x="122" y="490" font-size="12" fill="rgba(255,255,255,0.42)">Select ChatGPT, Claude or Gemini — each model is optimized differently</text>

  <rect x="55" y="512" width="790" height="54" rx="10" fill="url(#pG)" stroke="rgba(167,139,250,0.1)" stroke-width="1" filter="url(#sh)"/>
  <circle cx="92" cy="539" r="18" fill="rgba(167,139,250,0.18)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <text x="92" y="544" text-anchor="middle" font-size="14" font-weight="800" fill="#a78bfa">3</text>
  <text x="122" y="534" font-size="13" font-weight="600" fill="rgba(255,255,255,0.8)">Set tone and length</text>
  <text x="122" y="552" font-size="12" fill="rgba(255,255,255,0.42)">Professional · Friendly · Creative · Technical — Short · Medium · Long · Detailed</text>

  <rect x="55" y="574" width="790" height="54" rx="10" fill="url(#pG)" stroke="rgba(34,197,94,0.1)" stroke-width="1" filter="url(#sh)"/>
  <circle cx="92" cy="601" r="18" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.4)" stroke-width="1.5"/>
  <text x="92" y="606" text-anchor="middle" font-size="14" font-weight="800" fill="#22c55e">4</text>
  <text x="122" y="596" font-size="13" font-weight="600" fill="rgba(255,255,255,0.8)">Copy and use</text>
  <text x="122" y="614" font-size="12" fill="rgba(255,255,255,0.42)">Paste the generated prompt into ChatGPT, Claude or Gemini — get results instantly</text>

  <!-- ANATOMY OF A GREAT PROMPT -->
  <text x="450" y="678" text-anchor="middle" font-size="20" font-weight="700" fill="#f0e8ff">Anatomy of a Great Prompt</text>
  <line x1="150" y1="694" x2="750" y2="694" stroke="rgba(167,139,250,0.08)" stroke-width="1"/>

  <rect x="55" y="706" width="380" height="64" rx="10" fill="url(#pG)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
  <rect x="55" y="706" width="5" rx="2.5" height="64" fill="url(#bG)"/>
  <text x="80" y="730" font-size="14" font-weight="700" fill="#a78bfa">Role</text>
  <text x="80" y="750" font-size="11" fill="rgba(255,255,255,0.45)">Assign the AI a persona or expert role</text>
  <text x="80" y="764" font-size="11" fill="rgba(255,255,255,0.45)">"Act as a senior marketing strategist..."</text>

  <rect x="465" y="706" width="380" height="64" rx="10" fill="url(#pG)" stroke="rgba(96,165,250,0.16)" stroke-width="1"/>
  <rect x="465" y="706" width="5" rx="2.5" height="64" fill="rgba(96,165,250,0.7)"/>
  <text x="490" y="730" font-size="14" font-weight="700" fill="#60a5fa">Task</text>
  <text x="490" y="750" font-size="11" fill="rgba(255,255,255,0.45)">State exactly what you want produced</text>
  <text x="490" y="764" font-size="11" fill="rgba(255,255,255,0.45)">"Write a 500-word blog intro about..."</text>

  <rect x="55" y="778" width="380" height="64" rx="10" fill="url(#pG)" stroke="rgba(34,197,94,0.16)" stroke-width="1"/>
  <rect x="55" y="778" width="5" rx="2.5" height="64" fill="rgba(34,197,94,0.7)"/>
  <text x="80" y="802" font-size="14" font-weight="700" fill="#22c55e">Context</text>
  <text x="80" y="822" font-size="11" fill="rgba(255,255,255,0.45)">Provide background for better accuracy</text>
  <text x="80" y="836" font-size="11" fill="rgba(255,255,255,0.45)">"The audience is B2B SaaS founders..."</text>

  <rect x="465" y="778" width="380" height="64" rx="10" fill="url(#pG)" stroke="rgba(251,191,36,0.16)" stroke-width="1"/>
  <rect x="465" y="778" width="5" rx="2.5" height="64" fill="rgba(251,191,36,0.7)"/>
  <text x="490" y="802" font-size="14" font-weight="700" fill="#fbbf24">Format</text>
  <text x="490" y="822" font-size="11" fill="rgba(255,255,255,0.45)">Specify output structure and length</text>
  <text x="490" y="836" font-size="11" fill="rgba(255,255,255,0.45)">"Return as bullet points, max 200 words"</text>

  <!-- TIPS -->
  <text x="450" y="892" text-anchor="middle" font-size="20" font-weight="700" fill="#f0e8ff">5 Tips for Better Prompts</text>
  <line x1="150" y1="908" x2="750" y2="908" stroke="rgba(167,139,250,0.08)" stroke-width="1"/>

  <g font-size="12">
    <rect x="55" y="918" width="790" height="32" rx="8" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="75" y="939" fill="#a78bfa" font-weight="600">✦</text>
    <text x="95" y="939" fill="rgba(255,255,255,0.6)">Be specific — vague goals produce vague results every time</text>

    <rect x="55" y="956" width="790" height="32" rx="8" fill="rgba(96,165,250,0.05)" stroke="rgba(96,165,250,0.1)" stroke-width="1"/>
    <text x="75" y="977" fill="#60a5fa" font-weight="600">✦</text>
    <text x="95" y="977" fill="rgba(255,255,255,0.6)">Include the audience — knowing who will read it shapes everything</text>

    <rect x="55" y="994" width="790" height="32" rx="8" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
    <text x="75" y="1015" fill="#c4b5fd" font-weight="600">✦</text>
    <text x="95" y="1015" fill="rgba(255,255,255,0.6)">Set the format upfront — list, essay, table, code — don't leave it to chance</text>

    <rect x="55" y="1032" width="790" height="32" rx="8" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.1)" stroke-width="1"/>
    <text x="75" y="1053" fill="#22c55e" font-weight="600">✦</text>
    <text x="95" y="1053" fill="rgba(255,255,255,0.6)">Match your prompt to the model — Claude excels at reasoning, ChatGPT at breadth</text>

    <rect x="55" y="1070" width="790" height="32" rx="8" fill="rgba(251,191,36,0.05)" stroke="rgba(251,191,36,0.1)" stroke-width="1"/>
    <text x="75" y="1091" fill="#fbbf24" font-weight="600">✦</text>
    <text x="95" y="1091" fill="rgba(255,255,255,0.6)">Iterate — if the first result is close but not perfect, refine the prompt not the output</text>
  </g>

  <!-- CTA -->
  <rect x="175" y="1128" width="550" height="52" rx="26" fill="url(#bG)" filter="url(#sh)"/>
  <text x="450" y="1160" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">✦ Generate Your First Prompt Free</text>
  <text x="450" y="1190" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.2)">toolnestai.net · AI Prompt Generator · Free · No Sign-Up</text>
</svg>

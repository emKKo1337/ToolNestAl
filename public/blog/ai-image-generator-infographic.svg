    <rect x="55" y="956" width="790" height="32" rx="8" fill="rgba(251,191,36,0.05)" stroke="rgba(251,191,36,0.1)" stroke-width="1"/>
    <text x="75" y="977" fill="#fbbf24" font-weight="600">✦</text>
    <text x="95" y="977" fill="rgba(255,255,255,0.6)">Name a lighting style: "golden hour", "studio lighting", "volumetric fog", "neon glow"</text>

    <rect x="55" y="994" width="790" height="32" rx="8" fill="rgba(96,165,250,0.05)" stroke="rgba(96,165,250,0.1)" stroke-width="1"/>
    <text x="75" y="1015" fill="#60a5fa" font-weight="600">✦</text>
    <text x="95" y="1015" fill="rgba(255,255,255,0.6)">Reference an artist or movement: "in the style of Monet", "Bauhaus composition"</text>

    <rect x="55" y="1032" width="790" height="32" rx="8" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.1)" stroke-width="1"/>
    <text x="75" y="1053" fill="#22c55e" font-weight="600">✦</text>
    <text x="95" y="1053" fill="rgba(255,255,255,0.6)">Specify the camera or lens: "shot on Canon 5D, 85mm f/1.4, bokeh background"</text>

    <rect x="55" y="1070" width="790" height="32" rx="8" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
    <text x="75" y="1091" fill="#c4b5fd" font-weight="600">✦</text>
    <text x="95" y="1091" fill="rgba(255,255,255,0.6)">Use negative prompts to exclude: "no text, no watermark, no blur, no distortion"</text>

<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0d0a1e"/><stop offset="100%" stop-color="#09090f"/></radialGradient>
    <radialGradient id="gL" cx="25%" cy="50%" r="45%"><stop offset="0%" stop-color="#ef4444" stop-opacity="0.1"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0"/></radialGradient>
    <radialGradient id="gR" cx="75%" cy="50%" r="45%"><stop offset="0%" stop-color="#6d28d9" stop-opacity="0.22"/><stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="pBad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1a0d0d" stop-opacity="0.97"/><stop offset="100%" stop-color="#0f0809" stop-opacity="0.97"/></linearGradient>
    <linearGradient id="pGood" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0d0a1e" stop-opacity="0.97"/><stop offset="100%" stop-color="#130820" stop-opacity="0.97"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#6d28d9" flood-opacity="0.28"/></filter>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <ellipse cx="290" cy="250" rx="400" ry="330" fill="url(#gL)"/>
  <ellipse cx="910" cy="250" rx="400" ry="330" fill="url(#gR)"/>

  <text x="600" y="55" text-anchor="middle" font-size="26" font-weight="700" fill="url(#aG)">AI Email Writer vs. Writing It Yourself</text>


    <text x="690" y="151" font-size="13" fill="rgba(255,255,255,0.7)">⚡  Professional email ready in under 30 seconds</text>

    <rect x="665" y="174" width="470" height="38" rx="8" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="690" y="197" font-size="13" fill="rgba(255,255,255,0.7)">✦  AI generates a strong first draft instantly</text>

    <rect x="665" y="220" width="470" height="38" rx="8" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="690" y="243" font-size="13" fill="rgba(255,255,255,0.7)">🎯  Consistent tone matched to purpose and recipient</text>

    <rect x="665" y="266" width="470" height="38" rx="8" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="690" y="289" font-size="13" fill="rgba(255,255,255,0.7)">✓  Polished grammar and natural phrasing every time</text>

    <rect x="665" y="312" width="470" height="38" rx="8" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="690" y="335" font-size="13" fill="rgba(255,255,255,0.7)">🌍  Supports multiple languages and writing styles</text>

    <rect x="665" y="358" width="470" height="38" rx="8" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="690" y="381" font-size="13" fill="rgba(255,255,255,0.7)">♾  Regenerate as many times as you need, free</text>

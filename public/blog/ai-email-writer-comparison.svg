  <rect x="45" y="78" width="510" height="375" rx="16" fill="url(#pBad)" stroke="rgba(239,68,68,0.2)" stroke-width="1" filter="url(#sh)"/>
  <rect x="45" y="78" width="510" height="4" rx="2" fill="#ef4444"/>
  <text x="300" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#f87171">✗ Writing Emails Manually</text>


    <rect x="65" y="128" width="470" height="38" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
    <text x="90" y="151" font-size="13" fill="rgba(255,255,255,0.62)">⏱  15–30 minutes per email on average</text>

    <rect x="65" y="174" width="470" height="38" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
    <text x="90" y="197" font-size="13" fill="rgba(255,255,255,0.62)">😰  Staring at a blank screen, unsure how to start</text>

    <rect x="65" y="220" width="470" height="38" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
    <text x="90" y="243" font-size="13" fill="rgba(255,255,255,0.62)">❌  Inconsistent tone across different emails</text>

    <rect x="65" y="266" width="470" height="38" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
    <text x="90" y="289" font-size="13" fill="rgba(255,255,255,0.62)">🔤  Grammar and phrasing errors slip through</text>

    <rect x="65" y="312" width="470" height="38" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
    <text x="90" y="335" font-size="13" fill="rgba(255,255,255,0.62)">🌐  Struggle translating ideas across languages</text>

    <rect x="65" y="358" width="470" height="38" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>

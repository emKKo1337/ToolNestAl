<svg viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#160a2e"/><stop offset="100%" stop-color="#09090f"/></radialGradient>
    <radialGradient id="g1" cx="50%" cy="20%" r="50%"><stop offset="0%" stop-color="#6d28d9" stop-opacity="0.28"/><stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="50%" cy="80%" r="50%"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="bG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1e1040" stop-opacity="0.96"/><stop offset="100%" stop-color="#0f0820" stop-opacity="0.96"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#6d28d9" flood-opacity="0.3"/></filter>
    <filter id="gF"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="1200" fill="url(#bg)"/>
  <ellipse cx="450" cy="280" rx="500" ry="380" fill="url(#g1)"/>
  <ellipse cx="450" cy="920" rx="500" ry="380" fill="url(#g2)"/>

  <!-- Header badge -->
  <rect x="300" y="28" width="300" height="38" rx="19" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <text x="450" y="52" text-anchor="middle" font-size="14" font-weight="600" fill="#a78bfa">✦ ToolNest AI — 2026 Guide</text>

  <text x="450" y="118" text-anchor="middle" font-size="36" font-weight="800" fill="url(#aG)" filter="url(#gF)">AI Email Writer</text>
  <text x="450" y="150" text-anchor="middle" font-size="17" fill="rgba(255,255,255,0.5)">The Complete 2026 Cheat Sheet</text>
  <line x1="100" y1="170" x2="800" y2="170" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>

  <!-- STAT CARDS -->
  <rect x="55" y="190" width="245" height="120" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1" filter="url(#sh)"/>
  <text x="177" y="242" text-anchor="middle" font-size="44" font-weight="800" fill="#a78bfa">28%</text>
  <text x="177" y="268" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">of work time spent on email</text>
  <text x="177" y="284" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">(McKinsey, 2026)</text>
  <rect x="55" y="306" width="245" height="4" rx="2" fill="rgba(239,68,68,0.45)"/>

  <rect x="327" y="190" width="246" height="120" rx="14" fill="url(#pG)" stroke="rgba(96,165,250,0.15)" stroke-width="1" filter="url(#sh)"/>
  <text x="450" y="242" text-anchor="middle" font-size="44" font-weight="800" fill="#60a5fa">30s</text>
  <text x="450" y="268" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">to generate a polished email</text>
  <text x="450" y="284" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">with AI vs. 20+ minutes manually</text>
  <rect x="327" y="306" width="246" height="4" rx="2" fill="rgba(96,165,250,0.45)"/>

  <rect x="600" y="190" width="245" height="120" rx="14" fill="url(#pG)" stroke="rgba(34,197,94,0.15)" stroke-width="1" filter="url(#sh)"/>
  <text x="722" y="242" text-anchor="middle" font-size="44" font-weight="800" fill="#22c55e">2×</text>
  <text x="722" y="268" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">higher reply rate with</text>
  <text x="722" y="284" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">a personalised subject line</text>
  <rect x="600" y="306" width="245" height="4" rx="2" fill="rgba(34,197,94,0.45)"/>

  <!-- ANATOMY SECTION -->
  <text x="450" y="365" text-anchor="middle" font-size="20" font-weight="700" fill="#f0e8ff">Anatomy of a Great Business Email</text>
  <line x1="150" y1="380" x2="750" y2="380" stroke="rgba(167,139,250,0.08)" stroke-width="1"/>

  <rect x="55" y="395" width="790" height="360" rx="16" fill="url(#pG)" stroke="rgba(167,139,250,0.1)" stroke-width="1" filter="url(#sh)"/>
  <rect x="55" y="395" width="790" height="4" rx="2" fill="url(#aG)"/>

  <!-- Subject line -->
  <rect x="75" y="415" width="750" height="48" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.14)" stroke-width="1"/>
  <text x="95" y="434" font-size="10" font-weight="700" letter-spacing="1.5" fill="#a78bfa">SUBJECT LINE</text>
  <text x="95" y="452" font-size="12" fill="rgba(255,255,255,0.55)">Clear, specific, 40–60 chars · No clickbait · Mirrors recipient's priority</text>
  <text x="790" y="443" text-anchor="end" font-size="11" fill="rgba(167,139,250,0.6)">Highest open-rate impact</text>

  <!-- Opening -->
  <rect x="75" y="470" width="750" height="48" rx="8" fill="rgba(96,165,250,0.04)" stroke="rgba(96,165,250,0.12)" stroke-width="1"/>
  <text x="95" y="489" font-size="10" font-weight="700" letter-spacing="1.5" fill="#60a5fa">OPENING LINE</text>
  <text x="95" y="507" font-size="12" fill="rgba(255,255,255,0.55)">State purpose within first sentence · Avoid "I hope this email finds you well"</text>
  <text x="790" y="498" text-anchor="end" font-size="11" fill="rgba(96,165,250,0.6)">Get to the point fast</text>

  <!-- Body -->
  <rect x="75" y="525" width="750" height="48" rx="8" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <text x="95" y="544" font-size="10" font-weight="700" letter-spacing="1.5" fill="#c4b5fd">BODY</text>
  <text x="95" y="562" font-size="12" fill="rgba(255,255,255,0.55)">3–5 sentences max per paragraph · One idea per section · Use bullet points</text>
  <text x="790" y="553" text-anchor="end" font-size="11" fill="rgba(167,139,250,0.5)">Scannability matters</text>

  <!-- CTA -->
  <rect x="75" y="580" width="750" height="48" rx="8" fill="rgba(34,197,94,0.04)" stroke="rgba(34,197,94,0.12)" stroke-width="1"/>
  <text x="95" y="599" font-size="10" font-weight="700" letter-spacing="1.5" fill="#22c55e">CALL TO ACTION</text>
  <text x="95" y="617" font-size="12" fill="rgba(255,255,255,0.55)">Single, clear ask · Specific deadline if needed · Make replying frictionless</text>
  <text x="790" y="608" text-anchor="end" font-size="11" fill="rgba(34,197,94,0.6)">One CTA only</text>

  <!-- Sign-off -->
  <rect x="75" y="635" width="750" height="48" rx="8" fill="rgba(244,114,182,0.04)" stroke="rgba(244,114,182,0.1)" stroke-width="1"/>
  <text x="95" y="654" font-size="10" font-weight="700" letter-spacing="1.5" fill="#f472b6">SIGN-OFF</text>
  <text x="95" y="672" font-size="12" fill="rgba(255,255,255,0.55)">Match formality to context · Include name, title, contact · Keep it brief</text>
  <text x="790" y="663" text-anchor="end" font-size="11" fill="rgba(244,114,182,0.5)">Leaves a strong impression</text>

  <!-- MISTAKES SECTION -->
  <text x="450" y="800" text-anchor="middle" font-size="20" font-weight="700" fill="#f0e8ff">6 Email Mistakes AI Eliminates</text>
  <line x1="150" y1="815" x2="750" y2="815" stroke="rgba(167,139,250,0.08)" stroke-width="1"/>

  <g>
    <rect x="55" y="828" width="380" height="56" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.12)" stroke-width="1"/>
    <text x="75" y="851" font-size="13" fill="#f87171">✗</text>
    <text x="98" y="851" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">Vague subject lines</text>
    <text x="98" y="869" font-size="11" fill="rgba(255,255,255,0.38)">AI writes specific, action-oriented subjects</text>

    <rect x="465" y="828" width="380" height="56" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.12)" stroke-width="1"/>
    <text x="485" y="851" font-size="13" fill="#f87171">✗</text>
    <text x="508" y="851" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">Starting with "I hope…"</text>
    <text x="508" y="869" font-size="11" fill="rgba(255,255,255,0.38)">AI opens with purpose, not pleasantries</text>

    <rect x="55" y="892" width="380" height="56" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
    <text x="75" y="915" font-size="13" fill="#f87171">✗</text>
    <text x="98" y="915" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">Walls of unbroken text</text>
    <text x="98" y="933" font-size="11" fill="rgba(255,255,255,0.38)">AI structures with paragraphs and bullets</text>

    <rect x="465" y="892" width="380" height="56" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
    <text x="485" y="915" font-size="13" fill="#f87171">✗</text>
    <text x="508" y="915" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">Multiple conflicting asks</text>
    <text x="508" y="933" font-size="11" fill="rgba(255,255,255,0.38)">AI focuses on a single clear call to action</text>

    <rect x="55" y="956" width="380" height="56" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
    <text x="75" y="979" font-size="13" fill="#f87171">✗</text>
    <text x="98" y="979" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">Wrong tone for the context</text>
    <text x="98" y="997" font-size="11" fill="rgba(255,255,255,0.38)">AI matches tone to email purpose exactly</text>

    <rect x="465" y="956" width="380" height="56" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
    <text x="485" y="979" font-size="13" fill="#f87171">✗</text>
    <text x="508" y="979" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">Grammar and spelling errors</text>
    <text x="508" y="997" font-size="11" fill="rgba(255,255,255,0.38)">AI produces polished, clean prose</text>
  </g>

  <!-- CTA -->
  <rect x="175" y="1068" width="550" height="60" rx="30" fill="url(#bG)" filter="url(#sh)"/>
  <text x="450" y="1104" text-anchor="middle" font-size="17" font-weight="700" fill="#fff">✦ Write Your First Email Free</text>

  <text x="450" y="1158" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.22)">toolnestai.net · AI Email Writer · Free · No Sign-Up</text>
</svg>

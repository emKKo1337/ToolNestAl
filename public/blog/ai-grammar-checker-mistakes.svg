<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%"><stop offset="0%" stop-color="#0a0618"/><stop offset="100%" stop-color="#07070f"/></radialGradient>
    <radialGradient id="gC" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="#5b21b6" stop-opacity="0.26"/><stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="bG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#130b2e" stop-opacity="0.97"/><stop offset="100%" stop-color="#0c0820" stop-opacity="0.97"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#5b21b6" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <ellipse cx="600" cy="250" rx="700" ry="380" fill="url(#gC)"/>

  <text x="600" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#a78bfa" letter-spacing="2">COMMON MISTAKES</text>
  <text x="600" y="88" text-anchor="middle" font-size="32" font-weight="800" fill="url(#aG)">Grammar Errors AI Catches Instantly</text>
  <text x="600" y="116" text-anchor="middle" font-size="15" fill="rgba(255,255,255,0.42)">Before vs. after — six of the most common writing mistakes</text>

  <!-- 6 before/after cards, 3 per row -->
  <!-- Card 1: Subject-Verb Agreement -->
  <rect x="40" y="136" width="360" height="152" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="40" y="136" width="360" height="4" rx="2" fill="url(#aG)"/>
  <text x="60" y="158" font-size="11" font-weight="700" letter-spacing="1.5" fill="rgba(167,139,250,0.7)">SUBJECT-VERB AGREEMENT</text>
  <!-- Before -->
  <rect x="60" y="164" width="148" height="56" rx="8" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.18)" stroke-width="1"/>
  <text x="134" y="179" text-anchor="middle" font-size="9" fill="rgba(239,68,68,0.6)">BEFORE</text>
  <text x="134" y="197" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">The team are</text>
  <text x="134" y="213" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">working hard</text>
  <rect x="80" y="208" width="60" height="2" rx="1" fill="rgba(239,68,68,0.8)"/>
  <!-- Arrow -->
  <text x="216" y="200" text-anchor="middle" font-size="16" fill="rgba(34,197,94,0.6)">→</text>
  <!-- After -->
  <rect x="228" y="164" width="148" height="56" rx="8" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.18)" stroke-width="1"/>
  <text x="302" y="179" text-anchor="middle" font-size="9" fill="rgba(34,197,94,0.6)">AFTER ✓</text>
  <text x="302" y="197" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">The team is</text>
  <text x="302" y="213" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">working hard</text>
  <text x="60" y="252" font-size="11" fill="rgba(255,255,255,0.42)">Collective nouns take singular verbs</text>
  <text x="60" y="268" font-size="11" fill="rgba(255,255,255,0.42)">in American English.</text>

  <!-- Card 2: Apostrophe -->
  <rect x="420" y="136" width="360" height="152" rx="14" fill="url(#pG)" stroke="rgba(96,165,250,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="420" y="136" width="360" height="4" rx="2" fill="rgba(96,165,250,0.5)"/>
  <text x="440" y="158" font-size="11" font-weight="700" letter-spacing="1.5" fill="rgba(96,165,250,0.7)">APOSTROPHE MISUSE</text>
  <rect x="440" y="164" width="148" height="56" rx="8" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.18)" stroke-width="1"/>
  <text x="514" y="179" text-anchor="middle" font-size="9" fill="rgba(239,68,68,0.6)">BEFORE</text>
  <text x="514" y="197" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">Its a great</text>
  <text x="514" y="213" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">opportunity</text>
  <rect x="452" y="208" width="36" height="2" rx="1" fill="rgba(239,68,68,0.8)"/>
  <text x="596" y="200" text-anchor="middle" font-size="16" fill="rgba(34,197,94,0.6)">→</text>
  <rect x="608" y="164" width="148" height="56" rx="8" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.18)" stroke-width="1"/>
  <text x="682" y="179" text-anchor="middle" font-size="9" fill="rgba(34,197,94,0.6)">AFTER ✓</text>
  <text x="682" y="197" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">It's a great</text>
  <text x="682" y="213" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">opportunity</text>
  <text x="440" y="252" font-size="11" fill="rgba(255,255,255,0.42)">Its = possessive. It's = it is.</text>
  <text x="440" y="268" font-size="11" fill="rgba(255,255,255,0.42)">One of the most common errors.</text>

  <!-- Card 3: Run-on sentence -->
  <rect x="800" y="136" width="360" height="152" rx="14" fill="url(#pG)" stroke="rgba(244,114,182,0.16)" stroke-width="1" filter="url(#sh)"/>
  <rect x="800" y="136" width="360" height="4" rx="2" fill="rgba(244,114,182,0.45)"/>
  <text x="820" y="158" font-size="11" font-weight="700" letter-spacing="1.5" fill="rgba(244,114,182,0.7)">RUN-ON SENTENCE</text>
  <rect x="820" y="164" width="148" height="56" rx="8" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.18)" stroke-width="1"/>
  <text x="894" y="179" text-anchor="middle" font-size="9" fill="rgba(239,68,68,0.6)">BEFORE</text>
  <text x="894" y="195" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.6)">I love writing it</text>
  <text x="894" y="210" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.6)">helps me think</text>
  <rect x="820" y="208" width="148" height="2" rx="1" fill="rgba(239,68,68,0.8)"/>
  <text x="976" y="200" text-anchor="middle" font-size="16" fill="rgba(34,197,94,0.6)">→</text>
  <rect x="988" y="164" width="148" height="56" rx="8" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.18)" stroke-width="1"/>
  <text x="1062" y="179" text-anchor="middle" font-size="9" fill="rgba(34,197,94,0.6)">AFTER ✓</text>
  <text x="1062" y="195" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.6)">I love writing.</text>
  <text x="1062" y="210" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.6)">It helps me think.</text>
  <text x="820" y="252" font-size="11" fill="rgba(255,255,255,0.42)">Separate independent clauses</text>
  <text x="820" y="268" font-size="11" fill="rgba(255,255,255,0.42)">with a period or conjunction.</text>

  <!-- Row 2 -->
  <!-- Card 4: Their/There/They're -->
  <rect x="40" y="304" width="360" height="152" rx="14" fill="url(#pG)" stroke="rgba(34,197,94,0.14)" stroke-width="1" filter="url(#sh)"/>
  <rect x="40" y="304" width="360" height="4" rx="2" fill="rgba(34,197,94,0.45)"/>
  <text x="60" y="326" font-size="11" font-weight="700" letter-spacing="1.5" fill="rgba(34,197,94,0.7)">THERE / THEIR / THEY'RE</text>
  <rect x="60" y="332" width="148" height="56" rx="8" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.18)" stroke-width="1"/>
  <text x="134" y="347" text-anchor="middle" font-size="9" fill="rgba(239,68,68,0.6)">BEFORE</text>
  <text x="134" y="365" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">Their going to</text>
  <text x="134" y="381" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">the event</text>
  <rect x="70" y="376" width="50" height="2" rx="1" fill="rgba(239,68,68,0.8)"/>
  <text x="216" y="368" text-anchor="middle" font-size="16" fill="rgba(34,197,94,0.6)">→</text>
  <rect x="228" y="332" width="148" height="56" rx="8" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.18)" stroke-width="1"/>
  <text x="302" y="347" text-anchor="middle" font-size="9" fill="rgba(34,197,94,0.6)">AFTER ✓</text>
  <text x="302" y="365" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">They're going</text>
  <text x="302" y="381" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">to the event</text>
  <text x="60" y="420" font-size="11" fill="rgba(255,255,255,0.42)">Homophones are the most common</text>
  <text x="60" y="436" font-size="11" fill="rgba(255,255,255,0.42)">spelling errors in professional writing.</text>

  <!-- Card 5: Comma splice -->
  <rect x="420" y="304" width="360" height="152" rx="14" fill="url(#pG)" stroke="rgba(251,191,36,0.14)" stroke-width="1" filter="url(#sh)"/>
  <rect x="420" y="304" width="360" height="4" rx="2" fill="rgba(251,191,36,0.45)"/>
  <text x="440" y="326" font-size="11" font-weight="700" letter-spacing="1.5" fill="rgba(251,191,36,0.7)">COMMA SPLICE</text>
  <rect x="440" y="332" width="148" height="56" rx="8" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.18)" stroke-width="1"/>
  <text x="514" y="347" text-anchor="middle" font-size="9" fill="rgba(239,68,68,0.6)">BEFORE</text>
  <text x="514" y="365" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">I came, I saw,</text>
  <text x="514" y="381" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">I conquered</text>
  <rect x="452" y="376" width="60" height="2" rx="1" fill="rgba(239,68,68,0.8)"/>
  <text x="596" y="368" text-anchor="middle" font-size="16" fill="rgba(34,197,94,0.6)">→</text>
  <rect x="608" y="332" width="148" height="56" rx="8" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.18)" stroke-width="1"/>
  <text x="682" y="347" text-anchor="middle" font-size="9" fill="rgba(34,197,94,0.6)">AFTER ✓</text>
  <text x="682" y="365" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">I came; I saw;</text>
  <text x="682" y="381" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">I conquered.</text>
  <text x="440" y="420" font-size="11" fill="rgba(255,255,255,0.42)">Use semicolons or separate clauses</text>
  <text x="440" y="436" font-size="11" fill="rgba(255,255,255,0.42)">properly — not just commas.</text>

  <!-- Card 6: Passive overuse -->
  <rect x="800" y="304" width="360" height="152" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.14)" stroke-width="1" filter="url(#sh)"/>
  <rect x="800" y="304" width="360" height="4" rx="2" fill="rgba(167,139,250,0.4)"/>
  <text x="820" y="326" font-size="11" font-weight="700" letter-spacing="1.5" fill="rgba(167,139,250,0.7)">PASSIVE VOICE OVERUSE</text>
  <rect x="820" y="332" width="148" height="56" rx="8" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.18)" stroke-width="1"/>
  <text x="894" y="347" text-anchor="middle" font-size="9" fill="rgba(239,68,68,0.6)">BEFORE</text>
  <text x="894" y="365" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.6)">The report was</text>
  <text x="894" y="381" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.6)">written by me</text>
  <rect x="820" y="376" width="148" height="2" rx="1" fill="rgba(251,191,36,0.8)"/>
  <text x="976" y="368" text-anchor="middle" font-size="16" fill="rgba(34,197,94,0.6)">→</text>
  <rect x="988" y="332" width="148" height="56" rx="8" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.18)" stroke-width="1"/>
  <text x="1062" y="347" text-anchor="middle" font-size="9" fill="rgba(34,197,94,0.6)">AFTER ✓</text>
  <text x="1062" y="365" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.6)">I wrote</text>
  <text x="1062" y="381" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.6)">the report</text>
  <text x="820" y="420" font-size="11" fill="rgba(255,255,255,0.42)">Active voice is clearer, shorter,</text>
  <text x="820" y="436" font-size="11" fill="rgba(255,255,255,0.42)">and more direct in most writing.</text>
</svg>

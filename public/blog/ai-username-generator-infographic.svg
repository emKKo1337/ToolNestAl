  <ellipse cx="800" cy="1150" rx="52" ry="9" fill="rgba(124,58,237,0.28)" stroke="rgba(167,139,250,0.28)" stroke-width="1"/>
  <rect x="766" y="1062" width="68" height="82" rx="20" fill="url(#robG)" filter="url(#robGlow)"/>
  <rect x="774" y="1073" width="52" height="34" rx="9" fill="url(#robFG)" stroke="rgba(167,139,250,0.35)" stroke-width="1.5"/>
  <text x="800" y="1085" text-anchor="middle" font-size="7" fill="rgba(167,139,250,0.55)">A I</text>
  <text x="800" y="1102" text-anchor="middle" font-size="16" font-weight="900" fill="url(#aG)" filter="url(#glow)">AI</text>
  <rect x="748" y="1070" width="18" height="48" rx="9" fill="url(#robG)"/>
  <rect x="834" y="1070" width="18" height="48" rx="9" fill="url(#robG)"/>
  <circle cx="800" cy="1108" r="5" fill="rgba(96,165,250,0.7)" filter="url(#neon)"/>
  <rect x="792" y="1046" width="16" height="18" rx="6" fill="url(#robG)"/>
  <rect x="766" y="1000" width="68" height="48" rx="18" fill="url(#robG)" filter="url(#robGlow)"/>
  <rect x="774" y="1008" width="52" height="36" rx="10" fill="url(#robFG)" stroke="rgba(167,139,250,0.45)" stroke-width="1.5"/>
  <circle cx="789" cy="1024" r="8" fill="rgba(124,58,237,0.45)" stroke="rgba(167,139,250,0.55)" stroke-width="1.5"/>
  <circle cx="811" cy="1024" r="8" fill="rgba(124,58,237,0.45)" stroke="rgba(167,139,250,0.55)" stroke-width="1.5"/>
  <circle cx="789" cy="1023" r="4.5" fill="url(#aG)" filter="url(#glow)"/>
  <circle cx="811" cy="1023" r="4.5" fill="url(#aG)" filter="url(#glow)"/>
  <circle cx="790" cy="1022" r="2" fill="#fff"/>
  <circle cx="812" cy="1022" r="2" fill="#fff"/>
  <path d="M 783 1036 Q 800 1044 817 1036" stroke="url(#aG)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="800" y1="1000" x2="800" y2="984" stroke="rgba(167,139,250,0.55)" stroke-width="2"/>
  <circle cx="800" cy="979" r="6" fill="url(#bG)" filter="url(#neon)"/>
  <circle cx="764" cy="1024" r="7" fill="url(#robG)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <circle cx="836" cy="1024" r="7" fill="url(#robG)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>

  <rect x="28" y="960" width="700" height="76" rx="14" fill="url(#bG)" filter="url(#sh)"/>
  <text x="378" y="988" text-anchor="middle" font-size="18" font-weight="900" fill="#fff">Generate Your Username Free</text>
  <text x="378" y="1010" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.65)">No account. No subscription. Instant results.</text>
  <text x="378" y="1028" text-anchor="middle" font-size="11" font-weight="700" fill="rgba(255,255,255,0.85)">toolnestai.net/ai-tools/ai-username-generator</text>
</svg>

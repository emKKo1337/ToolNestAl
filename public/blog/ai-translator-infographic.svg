  <rect x="55" y="716" width="380" height="58" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.12)" stroke-width="1"/>
  <text x="75" y="741" font-size="13" fill="#f87171">✗</text>
  <text x="98" y="741" font-size="13" font-weight="600" fill="rgba(255,255,255,0.75)">Translating slang literally</text>
  <text x="98" y="758" font-size="11" fill="rgba(255,255,255,0.38)">Provide context — AI handles idioms better with full sentences</text>

  <rect x="465" y="716" width="380" height="58" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.12)" stroke-width="1"/>
  <text x="485" y="741" font-size="13" fill="#f87171">✗</text>
  <text x="508" y="741" font-size="13" font-weight="600" fill="rgba(255,255,255,0.75)">Skipping the review step</text>
  <text x="508" y="758" font-size="11" fill="rgba(255,255,255,0.38)">Always read output before publishing official content</text>

  <rect x="55" y="782" width="380" height="58" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
  <text x="75" y="807" font-size="13" fill="#f87171">✗</text>
  <text x="98" y="807" font-size="13" font-weight="600" fill="rgba(255,255,255,0.75)">Pasting garbled source text</text>
  <text x="98" y="824" font-size="11" fill="rgba(255,255,255,0.38)">Clean input = accurate output; fix typos before translating</text>

  <rect x="465" y="782" width="380" height="58" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
  <text x="485" y="807" font-size="13" fill="#f87171">✗</text>
  <text x="508" y="807" font-size="13" font-weight="600" fill="rgba(255,255,255,0.75)">Ignoring cultural nuance</text>
  <text x="508" y="824" font-size="11" fill="rgba(255,255,255,0.38)">AI translates words — add cultural context yourself</text>

  <rect x="55" y="848" width="380" height="58" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
  <text x="75" y="873" font-size="13" fill="#f87171">✗</text>
  <text x="98" y="873" font-size="13" font-weight="600" fill="rgba(255,255,255,0.75)">Overloading with one paste</text>
  <text x="98" y="890" font-size="11" fill="rgba(255,255,255,0.38)">Translate in sections for better control of long docs</text>

  <rect x="465" y="848" width="380" height="58" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
  <text x="485" y="873" font-size="13" fill="#f87171">✗</text>
  <text x="508" y="873" font-size="13" font-weight="600" fill="rgba(255,255,255,0.75)">Not using Detect Language</text>
  <text x="508" y="890" font-size="11" fill="rgba(255,255,255,0.38)">Let AI detect the source — manual selection causes errors</text>


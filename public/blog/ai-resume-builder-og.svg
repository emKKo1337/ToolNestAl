  <rect x="737" y="273" width="200" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="737" y="284" width="155" height="5" rx="2.5" fill="rgba(255,255,255,0.06)"/>
  <circle cx="727" cy="303" r="3.5" fill="rgba(76,215,246,0.4)"/>
  <rect x="737" y="300" width="175" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="737" y="311" width="130" height="5" rx="2.5" fill="rgba(255,255,255,0.05)"/>
  <circle cx="727" cy="330" r="3.5" fill="rgba(76,215,246,0.25)"/>
  <rect x="737" y="327" width="160" height="6" rx="3" fill="rgba(255,255,255,0.07)"/>


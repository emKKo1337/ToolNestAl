  <rect x="800" y="411" width="65" height="20" rx="10" fill="rgba(76,215,246,0.07)" stroke="rgba(76,215,246,0.15)" stroke-width="0.5"/>
  <rect x="873" y="411" width="80" height="20" rx="10" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.15)" stroke-width="0.5"/>
  <rect x="720" y="438" width="85" height="20" rx="10" fill="rgba(244,114,182,0.07)" stroke="rgba(244,114,182,0.15)" stroke-width="0.5"/>
  <rect x="813" y="438" width="70" height="20" rx="10" fill="rgba(34,197,94,0.07)" stroke="rgba(34,197,94,0.15)" stroke-width="0.5"/>


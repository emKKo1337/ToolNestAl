<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%"><stop offset="0%" stop-color="#0a0618"/><stop offset="100%" stop-color="#07070f"/></radialGradient>
    <radialGradient id="gL" cx="25%" cy="50%" r="55%"><stop offset="0%" stop-color="#5b21b6" stop-opacity="0.28"/><stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/></radialGradient>
    <radialGradient id="gR" cx="75%" cy="50%" r="55%"><stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="bG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#130b2e" stop-opacity="0.97"/><stop offset="100%" stop-color="#0c0820" stop-opacity="0.97"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#5b21b6" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <ellipse cx="280" cy="250" rx="480" ry="360" fill="url(#gL)"/>
  <ellipse cx="920" cy="250" rx="480" ry="360" fill="url(#gR)"/>

  <text x="600" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#a78bfa" letter-spacing="2">HEAD-TO-HEAD</text>
  <text x="600" y="82" text-anchor="middle" font-size="30" font-weight="800" fill="url(#aG)">Manual Reading vs. AI Summarizer</text>

  <circle cx="600" cy="292" r="36" fill="url(#pG)" stroke="rgba(167,139,250,0.3)" stroke-width="2"/>
  <text x="600" y="300" text-anchor="middle" font-size="18" font-weight="800" fill="url(#aG)">VS</text>

  <!-- LEFT: Manual -->
  <rect x="40" y="108" width="520" height="372" rx="16" fill="url(#pG)" stroke="rgba(239,68,68,0.2)" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="40" y="108" width="520" height="4" rx="2" fill="rgba(239,68,68,0.55)"/>
  <text x="300" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#fca5a5">✎ Manual Reading &amp; Notes</text>
  <g font-size="13">
    <rect x="60" y="154" width="480" height="36" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
    <text x="80" y="177" fill="rgba(255,255,255,0.55)">⏱  Time per document</text><text x="520" y="177" text-anchor="end" fill="#f87171">20–60 min per article</text>
    <rect x="60" y="196" width="480" height="36" rx="8" fill="rgba(239,68,68,0.03)" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
    <text x="80" y="219" fill="rgba(255,255,255,0.55)">🎯  Key point accuracy</text><text x="520" y="219" text-anchor="end" fill="#f87171">Depends on reader focus</text>
    <rect x="60" y="238" width="480" height="36" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
    <text x="80" y="261" fill="rgba(255,255,255,0.55)">🔁  Consistency</text><text x="520" y="261" text-anchor="end" fill="#f87171">Varies with fatigue</text>
    <rect x="60" y="280" width="480" height="36" rx="8" fill="rgba(239,68,68,0.03)" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
    <text x="80" y="303" fill="rgba(255,255,255,0.55)">📚  Volume capacity</text><text x="520" y="303" text-anchor="end" fill="#f87171">2–3 docs per hour</text>
    <rect x="60" y="322" width="480" height="36" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
    <text x="80" y="345" fill="rgba(255,255,255,0.55)">🌐  Language support</text><text x="520" y="345" text-anchor="end" fill="#f87171">Languages you speak</text>
    <rect x="60" y="364" width="480" height="36" rx="8" fill="rgba(239,68,68,0.03)" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
    <text x="80" y="387" fill="rgba(255,255,255,0.55)">📋  Output format</text><text x="520" y="387" text-anchor="end" fill="#fbbf24">Handwritten notes only</text>
    <rect x="60" y="406" width="480" height="36" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
    <text x="80" y="429" fill="rgba(255,255,255,0.55)">💰  Cost</text><text x="520" y="429" text-anchor="end" fill="#f87171">Hours of your time</text>
  </g>

  <!-- RIGHT: AI Summarizer -->
  <rect x="640" y="108" width="520" height="372" rx="16" fill="url(#pG)" stroke="rgba(167,139,250,0.22)" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="640" y="108" width="520" height="4" rx="2" fill="url(#aG)"/>
  <text x="900" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#a78bfa">✦ AI Summarizer</text>
  <g font-size="13">
    <rect x="660" y="154" width="480" height="36" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="680" y="177" fill="rgba(255,255,255,0.55)">⏱  Time per document</text><text x="1120" y="177" text-anchor="end" fill="#4ade80">Under 10 seconds</text>
    <rect x="660" y="196" width="480" height="36" rx="8" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
    <text x="680" y="219" fill="rgba(255,255,255,0.55)">🎯  Key point accuracy</text><text x="1120" y="219" text-anchor="end" fill="#4ade80">Consistent &amp; comprehensive</text>
    <rect x="660" y="238" width="480" height="36" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="680" y="261" fill="rgba(255,255,255,0.55)">🔁  Consistency</text><text x="1120" y="261" text-anchor="end" fill="#4ade80">Same quality every time</text>
    <rect x="660" y="280" width="480" height="36" rx="8" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
    <text x="680" y="303" fill="rgba(255,255,255,0.55)">📚  Volume capacity</text><text x="1120" y="303" text-anchor="end" fill="#4ade80">Unlimited, back to back</text>
    <rect x="660" y="322" width="480" height="36" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="680" y="345" fill="rgba(255,255,255,0.55)">🌐  Language support</text><text x="1120" y="345" text-anchor="end" fill="#4ade80">100+ languages</text>
    <rect x="660" y="364" width="480" height="36" rx="8" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
    <text x="680" y="387" fill="rgba(255,255,255,0.55)">📋  Output format</text><text x="1120" y="387" text-anchor="end" fill="#4ade80">Short · Long · Bullet Points</text>
    <rect x="660" y="406" width="480" height="36" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="680" y="429" fill="rgba(255,255,255,0.55)">💰  Cost</text><text x="1120" y="429" text-anchor="end" fill="#4ade80">100% free</text>
  </g>
</svg>

<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%"><stop offset="0%" stop-color="#0d0520"/><stop offset="100%" stop-color="#07070f"/></radialGradient>
    <radialGradient id="gL" cx="20%" cy="50%" r="50%"><stop offset="0%" stop-color="#5b21b6" stop-opacity="0.2"/><stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/></radialGradient>
    <radialGradient id="gR" cx="80%" cy="50%" r="50%"><stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="bG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#130b2e" stop-opacity="0.97"/><stop offset="100%" stop-color="#0c0820" stop-opacity="0.97"/></linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#4ade80"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#5b21b6" flood-opacity="0.28"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>
  <ellipse cx="300" cy="250" rx="420" ry="300" fill="url(#gL)"/>
  <ellipse cx="900" cy="250" rx="420" ry="300" fill="url(#gR)"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="1">SEO OUTPUT BREAKDOWN</text>
  <text x="600" y="76" text-anchor="middle" font-size="26" font-weight="800" fill="url(#aG)" filter="url(#glow)">Everything Generated in One Click</text>
  <text x="600" y="102" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.42)">The AI writes your entire product listing — title, description, bullets, meta, keywords and readability score</text>

  <!-- Left panel: what gets generated -->
  <rect x="30" y="120" width="490" height="356" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.18)" stroke-width="1" filter="url(#sh)"/>
  <rect x="30" y="120" width="490" height="44" rx="14" fill="rgba(124,58,237,0.14)"/>
  <rect x="30" y="150" width="490" height="14" fill="rgba(124,58,237,0.14)"/>
  <text x="275" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="url(#aG)">✦ Complete Listing Generated</text>

  <!-- Item rows -->
  <g font-size="11">
    <!-- SEO Title -->
    <rect x="50" y="174" width="450" height="44" rx="8" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="66" y="191" font-weight="700" fill="rgba(255,255,255,0.8)">📌 SEO Product Title</text>
    <text x="66" y="208" font-size="10" fill="#a78bfa">Wireless Bluetooth Headphones — Premium Sound, All-Day Comfort</text>
    <rect x="440" y="178" width="52" height="16" rx="4" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
    <text x="466" y="189" text-anchor="middle" font-size="8" fill="#4ade80">50–60 chars</text>

    <!-- Description -->
    <rect x="50" y="226" width="450" height="52" rx="8" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="66" y="243" font-weight="700" fill="rgba(255,255,255,0.8)">📝 Full Description</text>
    <text x="66" y="258" font-size="10" fill="rgba(255,255,255,0.5)">Experience music like never before. Designed for those who demand premium</text>
    <text x="66" y="271" font-size="10" fill="rgba(255,255,255,0.5)">sound and all-day comfort, these headphones deliver...</text>

    <!-- Bullet points -->
    <rect x="50" y="286" width="450" height="62" rx="8" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="66" y="303" font-weight="700" fill="rgba(255,255,255,0.8)">✅ 5 Feature Bullet Points</text>
    <text x="66" y="318" font-size="10" fill="rgba(255,255,255,0.5)">✓ Advanced Noise Cancellation  ✓ 40H Battery  ✓ Ultra Comfort Fit</text>
    <text x="66" y="332" font-size="10" fill="rgba(255,255,255,0.5)">✓ Built-in Microphone  ✓ Foldable &amp; Lightweight</text>
    <rect x="440" y="290" width="52" height="16" rx="4" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
    <text x="466" y="301" text-anchor="middle" font-size="8" fill="#4ade80">Amazon ready</text>

    <!-- Meta description -->
    <rect x="50" y="356" width="450" height="44" rx="8" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="66" y="373" font-weight="700" fill="rgba(255,255,255,0.8)">🔎 Meta Description</text>
    <text x="66" y="388" font-size="10" fill="rgba(255,255,255,0.5)">Shop wireless bluetooth headphones with 40H battery, ANC &amp; mic. Free shipping.</text>
    <rect x="440" y="360" width="52" height="16" rx="4" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
    <text x="466" y="371" text-anchor="middle" font-size="8" fill="#4ade80">155 chars</text>

    <!-- Keywords row -->
    <rect x="50" y="408" width="450" height="52" rx="8" fill="rgba(167,139,250,0.07)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="66" y="425" font-weight="700" fill="rgba(255,255,255,0.8)">🏷 8 SEO Keywords</text>
    <g font-size="8" font-weight="600">
      <rect x="66" y="432" width="88" height="14" rx="3" fill="rgba(124,58,237,0.2)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
      <text x="110" y="442" text-anchor="middle" fill="#a78bfa">wireless headphones</text>
      <rect x="160" y="432" width="94" height="14" rx="3" fill="rgba(124,58,237,0.2)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
      <text x="207" y="442" text-anchor="middle" fill="#a78bfa">bluetooth headphones</text>
      <rect x="260" y="432" width="84" height="14" rx="3" fill="rgba(124,58,237,0.18)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
      <text x="302" y="442" text-anchor="middle" fill="#c4b5fd">noise cancellation</text>
      <rect x="350" y="432" width="72" height="14" rx="3" fill="rgba(124,58,237,0.18)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
      <text x="386" y="442" text-anchor="middle" fill="#c4b5fd">long battery</text>
      <rect x="428" y="432" width="64" height="14" rx="3" fill="rgba(124,58,237,0.15)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
      <text x="460" y="442" text-anchor="middle" fill="#ddd6fe">over-ear</text>
    </g>
  </g>

  <!-- Right panel: scores + breakdown -->
  <rect x="540" y="120" width="630" height="356" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.18)" stroke-width="1" filter="url(#sh)"/>
  <rect x="540" y="120" width="630" height="44" rx="14" fill="rgba(124,58,237,0.14)"/>
  <rect x="540" y="150" width="630" height="14" fill="rgba(124,58,237,0.14)"/>
  <text x="855" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="url(#aG)">📊 Quality Analysis</text>

  <!-- Big SEO score -->
  <circle cx="638" cy="268" r="64" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="12"/>
  <circle cx="638" cy="268" r="64" fill="none" stroke="url(#aG)" stroke-width="12" stroke-dasharray="309 93" stroke-linecap="round" transform="rotate(-90 638 268)"/>
  <text x="638" y="256" text-anchor="middle" font-size="36" font-weight="900" fill="#a78bfa" filter="url(#glow)">96</text>
  <text x="638" y="278" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">/ 100</text>
  <text x="638" y="356" text-anchor="middle" font-size="12" font-weight="700" fill="#a78bfa">SEO Score</text>
  <text x="638" y="373" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.38)">Industry-leading output</text>
  <text x="638" y="405" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">Excellent</text>
  <text x="638" y="422" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.38)">Readability: Grade 8</text>
  <text x="638" y="455" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.3)">Flesch-Kincaid Score: 72</text>

  <!-- Right score bars -->
  <g font-size="11">
    <text x="740" y="168" fill="rgba(255,255,255,0.55)" font-weight="600">Keyword Density</text>
    <rect x="740" y="174" width="400" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="740" y="174" width="368" height="8" rx="4" fill="url(#aG)"/>
    <text x="1146" y="184" font-size="9" fill="#a78bfa">92%</text>

    <text x="740" y="206" fill="rgba(255,255,255,0.55)" font-weight="600">Title Optimisation</text>
    <rect x="740" y="212" width="400" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="740" y="212" width="384" height="8" rx="4" fill="url(#greenG)"/>
    <text x="1146" y="222" font-size="9" fill="#4ade80">96%</text>

    <text x="740" y="244" fill="rgba(255,255,255,0.55)" font-weight="600">Meta Description</text>
    <rect x="740" y="250" width="400" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="740" y="250" width="376" height="8" rx="4" fill="url(#aG)"/>
    <text x="1146" y="260" font-size="9" fill="#a78bfa">94%</text>

    <text x="740" y="282" fill="rgba(255,255,255,0.55)" font-weight="600">Readability Score</text>
    <rect x="740" y="288" width="400" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="740" y="288" width="360" height="8" rx="4" fill="url(#greenG)"/>
    <text x="1146" y="298" font-size="9" fill="#4ade80">90%</text>

    <text x="740" y="320" fill="rgba(255,255,255,0.55)" font-weight="600">Content Uniqueness</text>
    <rect x="740" y="326" width="400" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="740" y="326" width="400" height="8" rx="4" fill="url(#aG)"/>
    <text x="1146" y="336" font-size="9" fill="#a78bfa">100%</text>

    <text x="740" y="358" fill="rgba(255,255,255,0.55)" font-weight="600">Conversion Potential</text>
    <rect x="740" y="364" width="400" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="740" y="364" width="352" height="8" rx="4" fill="url(#bG)"/>
    <text x="1146" y="374" font-size="9" fill="#c4b5fd">88%</text>

    <text x="740" y="396" fill="rgba(255,255,255,0.55)" font-weight="600">Brand Voice Match</text>
    <rect x="740" y="402" width="400" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="740" y="402" width="380" height="8" rx="4" fill="url(#greenG)"/>
    <text x="1146" y="412" font-size="9" fill="#4ade80">95%</text>

    <text x="740" y="434" fill="rgba(255,255,255,0.55)" font-weight="600">CTA Effectiveness</text>
    <rect x="740" y="440" width="400" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="740" y="440" width="368" height="8" rx="4" fill="url(#aG)"/>
    <text x="1146" y="450" font-size="9" fill="#a78bfa">92%</text>
  </g>
</svg>

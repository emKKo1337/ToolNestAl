<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%"><stop offset="0%" stop-color="#0a0118"/><stop offset="100%" stop-color="#05030d"/></radialGradient>
    <radialGradient id="gL" cx="20%" cy="50%" r="50%"><stop offset="0%" stop-color="#5b21b6" stop-opacity="0.18"/><stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/></radialGradient>
    <radialGradient id="gR" cx="80%" cy="50%" r="50%"><stop offset="0%" stop-color="#2563eb" stop-opacity="0.13"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="bG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#130b2e" stop-opacity="0.97"/><stop offset="100%" stop-color="#0c0820" stop-opacity="0.97"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#5b21b6" flood-opacity="0.28"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <ellipse cx="300" cy="250" rx="420" ry="300" fill="url(#gL)"/>
  <ellipse cx="900" cy="250" rx="420" ry="300" fill="url(#gR)"/>

  <text x="600" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="1">COMPARISON</text>
  <text x="600" y="76" text-anchor="middle" font-size="26" font-weight="800" fill="url(#aG)" filter="url(#glow)">AI Generator vs Manual Brainstorm vs Agency</text>
  <text x="600" y="102" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.42)">Three ways to find a username — an honest comparison of speed, cost and quality</text>

  <!-- Table container -->
  <rect x="22" y="116" width="1156" height="362" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1" filter="url(#sh)"/>

  <!-- Header row -->
  <rect x="22" y="116" width="1156" height="46" rx="14" fill="rgba(124,58,237,0.15)"/>
  <rect x="22" y="148" width="1156" height="14" fill="rgba(124,58,237,0.15)"/>
  <!-- Header cells -->
  <text x="200" y="146" text-anchor="middle" font-size="10" font-weight="700" fill="rgba(255,255,255,0.45)">Factor</text>
  <!-- ToolNest AI header (highlighted) -->
  <rect x="388" y="118" width="258" height="42" rx="0" fill="rgba(124,58,237,0.2)"/>
  <text x="517" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">✦ ToolNest AI</text>
  <text x="517" y="151" text-anchor="middle" font-size="9" fill="rgba(167,139,250,0.6)">(Free)</text>
  <text x="775" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="rgba(255,255,255,0.55)">Manual Brainstorm</text>
  <text x="1055" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="rgba(255,255,255,0.55)">Naming Agency</text>

  <!-- Vertical dividers -->
  <line x1="388" y1="116" x2="388" y2="478" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="646" y1="116" x2="646" y2="478" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="904" y1="116" x2="904" y2="478" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- AI column subtle highlight -->
  <rect x="389" y="162" width="256" height="314" fill="rgba(124,58,237,0.04)"/>

  <!-- Row data -->
  <g font-size="10">
    <!-- Row 1: Speed -->
    <rect x="22" y="162" width="1156" height="44" fill="rgba(255,255,255,0.015)"/>
    <line x1="22" y1="162" x2="1178" y2="162" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="200" y="188" text-anchor="middle" fill="rgba(255,255,255,0.45)">Speed</text>
    <text x="517" y="182" text-anchor="middle" font-weight="700" fill="#6ee7b7">Under 10 seconds</text>
    <text x="517" y="198" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.3)">Instant batch generation</text>
    <text x="775" y="188" text-anchor="middle" fill="rgba(255,255,255,0.45)">20–60 minutes</text>
    <text x="1055" y="188" text-anchor="middle" fill="rgba(255,255,255,0.45)">Days to weeks</text>

    <!-- Row 2: Cost -->
    <rect x="22" y="206" width="1156" height="44" fill="rgba(255,255,255,0.0)"/>
    <line x1="22" y1="206" x2="1178" y2="206" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="200" y="232" text-anchor="middle" fill="rgba(255,255,255,0.45)">Cost</text>
    <text x="517" y="226" text-anchor="middle" font-weight="700" fill="#6ee7b7">100% Free</text>
    <text x="517" y="242" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.3)">No account needed</text>
    <text x="775" y="232" text-anchor="middle" fill="rgba(255,255,255,0.45)">Your time only</text>
    <text x="1055" y="232" text-anchor="middle" fill="rgba(255,255,255,0.45)">£200–£2,000+</text>

    <!-- Row 3: Volume -->
    <rect x="22" y="250" width="1156" height="44" fill="rgba(255,255,255,0.015)"/>
    <line x1="22" y1="250" x2="1178" y2="250" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="200" y="276" text-anchor="middle" fill="rgba(255,255,255,0.45)">Volume</text>
    <text x="517" y="270" text-anchor="middle" font-weight="700" fill="#6ee7b7">Unlimited batches</text>
    <text x="517" y="286" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.3)">Generate as many as needed</text>
    <text x="775" y="276" text-anchor="middle" fill="rgba(255,255,255,0.45)">5–20 ideas typical</text>
    <text x="1055" y="276" text-anchor="middle" fill="rgba(255,255,255,0.45)">5–15 curated names</text>

    <!-- Row 4: Availability check -->
    <rect x="22" y="294" width="1156" height="44" fill="rgba(255,255,255,0.0)"/>
    <line x1="22" y1="294" x2="1178" y2="294" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="200" y="320" text-anchor="middle" fill="rgba(255,255,255,0.45)">Availability check</text>
    <text x="517" y="314" text-anchor="middle" font-weight="700" fill="#6ee7b7">Built-in, instant</text>
    <text x="517" y="330" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.3)">Multi-platform at once</text>
    <text x="775" y="320" text-anchor="middle" fill="rgba(255,255,255,0.45)">Manual per name</text>
    <text x="1055" y="320" text-anchor="middle" fill="rgba(255,255,255,0.45)">Usually included</text>

    <!-- Row 5: Personalisation -->
    <rect x="22" y="338" width="1156" height="44" fill="rgba(255,255,255,0.015)"/>
    <line x1="22" y1="338" x2="1178" y2="338" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="200" y="364" text-anchor="middle" fill="rgba(255,255,255,0.45)">Personalisation</text>
    <text x="517" y="358" text-anchor="middle" font-weight="700" fill="#6ee7b7">Keyword + style guided</text>
    <text x="517" y="374" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.3)">Adjust anytime, unlimited</text>
    <text x="775" y="364" text-anchor="middle" fill="rgba(255,255,255,0.45)">Fully personal</text>
    <text x="1055" y="364" text-anchor="middle" fill="rgba(255,255,255,0.45)">Deep research-based</text>

    <!-- Row 6: Best for -->
    <line x1="22" y1="382" x2="1178" y2="382" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="200" y="412" text-anchor="middle" fill="rgba(255,255,255,0.45)">Best for</text>
    <text x="517" y="404" text-anchor="middle" font-weight="700" fill="#a78bfa">Everyone · Any platform</text>
    <text x="517" y="420" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.3)">Gamers, creators, businesses</text>
    <text x="775" y="412" text-anchor="middle" fill="rgba(255,255,255,0.45)">When you have time</text>
    <text x="1055" y="412" text-anchor="middle" fill="rgba(255,255,255,0.45)">Enterprise brands</text>

    <!-- Row 7: Verdict -->
    <rect x="22" y="438" width="1156" height="40" rx="14" fill="rgba(124,58,237,0.08)"/>
    <rect x="22" y="438" width="1156" height="16" fill="rgba(124,58,237,0.08)"/>
    <line x1="22" y1="438" x2="1178" y2="438" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="200" y="462" text-anchor="middle" font-weight="700" fill="rgba(255,255,255,0.5)">Verdict</text>
    <rect x="397" y="442" width="240" height="26" rx="8" fill="url(#bG)"/>
    <text x="517" y="459" text-anchor="middle" font-weight="700" fill="#fff">⭐ Best starting point</text>
    <text x="775" y="462" text-anchor="middle" fill="rgba(255,255,255,0.35)">Good for early ideas</text>
    <text x="1055" y="462" text-anchor="middle" fill="rgba(255,255,255,0.35)">For major brand launches</text>
  </g>
</svg>

  <text x="160" y="394" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">referrals and collaborations</text>
  <rect x="58" y="408" width="80" height="20" rx="10" fill="rgba(244,114,182,0.1)" stroke="rgba(244,114,182,0.22)" stroke-width="1"/>
  <text x="98" y="422" text-anchor="middle" font-size="10" fill="#f472b6">Warm</text>

  <!-- Job application -->
  <rect x="320" y="285" width="260" height="155" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.18)" stroke-width="1" filter="url(#sh)"/>
  <rect x="320" y="285" width="260" height="4" rx="2" fill="#8b5cf6"/>
  <text x="450" y="328" text-anchor="middle" font-size="28">📄</text>
  <text x="450" y="358" text-anchor="middle" font-size="14" font-weight="700" fill="#f0e8ff">Job Application</text>
  <text x="450" y="378" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">Cover letters, introductions,</text>
  <text x="450" y="394" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">and networking emails</text>
  <rect x="338" y="408" width="100" height="20" rx="10" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.22)" stroke-width="1"/>
  <text x="388" y="422" text-anchor="middle" font-size="10" fill="#c4b5fd">Enthusiastic</text>

  <!-- Newsletter -->
  <rect x="600" y="285" width="260" height="155" rx="14" fill="url(#pG)" stroke="rgba(20,184,166,0.2)" stroke-width="1" filter="url(#sh)"/>
  <rect x="600" y="285" width="260" height="4" rx="2" fill="#14b8a6"/>
  <text x="730" y="328" text-anchor="middle" font-size="28">📰</text>
  <text x="730" y="358" text-anchor="middle" font-size="14" font-weight="700" fill="#f0e8ff">Newsletter &amp; Announcements</text>
  <text x="730" y="378" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">Product updates, company</text>
  <text x="730" y="394" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">news and event invites</text>
  <rect x="618" y="408" width="70" height="20" rx="10" fill="rgba(20,184,166,0.1)" stroke="rgba(20,184,166,0.22)" stroke-width="1"/>
  <text x="653" y="422" text-anchor="middle" font-size="10" fill="#2dd4bf">Engaging</text>

  <!-- Custom -->
  <rect x="880" y="285" width="280" height="155" rx="14" fill="url(#pG)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#sh)"/>
  <rect x="880" y="285" width="280" height="4" rx="2" fill="url(#aG)"/>
  <text x="1020" y="328" text-anchor="middle" font-size="28">✦</text>
  <text x="1020" y="358" text-anchor="middle" font-size="14" font-weight="700" fill="#f0e8ff">Any Custom Purpose</text>
  <text x="1020" y="378" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">Describe your scenario and</text>
  <text x="1020" y="394" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">the AI handles the rest</text>
  <rect x="898" y="408" width="110" height="20" rx="10" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.22)" stroke-width="1"/>
  <text x="953" y="422" text-anchor="middle" font-size="10" fill="#a78bfa">Fully flexible</text>

  <text x="600" y="478" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.22)">toolnestai.net — AI Email Writer handles every scenario, free</text>
</svg>

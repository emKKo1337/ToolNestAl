<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#120a26"/><stop offset="100%" stop-color="#09090f"/></radialGradient>
    <radialGradient id="g1" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#6d28d9" stop-opacity="0.2"/><stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1e1040" stop-opacity="0.96"/><stop offset="100%" stop-color="#0f0820" stop-opacity="0.96"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#6d28d9" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <ellipse cx="600" cy="250" rx="600" ry="350" fill="url(#g1)"/>

  <text x="600" y="55" text-anchor="middle" font-size="26" font-weight="700" fill="url(#aG)">Email Types You Can Write with AI</text>
  <text x="600" y="80" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.4)">One tool handles every professional email scenario</text>

  <!-- Card grid: 4 across, 2 rows -->
  <!-- Row 1 -->
  <!-- Business -->
  <rect x="40" y="105" width="260" height="155" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.2)" stroke-width="1" filter="url(#sh)"/>
  <rect x="40" y="105" width="260" height="4" rx="2" fill="#a78bfa"/>
  <text x="160" y="148" text-anchor="middle" font-size="28">💼</text>
  <text x="160" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#f0e8ff">Business Email</text>
  <text x="160" y="198" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">Proposals, updates, reports,</text>
  <text x="160" y="214" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">meeting requests &amp; more</text>
  <rect x="58" y="228" width="80" height="20" rx="10" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.22)" stroke-width="1"/>
  <text x="98" y="242" text-anchor="middle" font-size="10" fill="#a78bfa">Formal</text>
  <rect x="146" y="228" width="90" height="20" rx="10" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.18)" stroke-width="1"/>
  <text x="191" y="242" text-anchor="middle" font-size="10" fill="#c4b5fd">Professional</text>

  <!-- Sales -->
  <rect x="320" y="105" width="260" height="155" rx="14" fill="url(#pG)" stroke="rgba(96,165,250,0.2)" stroke-width="1" filter="url(#sh)"/>
  <rect x="320" y="105" width="260" height="4" rx="2" fill="#60a5fa"/>
  <text x="450" y="148" text-anchor="middle" font-size="28">📈</text>
  <text x="450" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#f0e8ff">Sales Outreach</text>
  <text x="450" y="198" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">Cold emails, pitches, demos,</text>
  <text x="450" y="214" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">offers and upsell sequences</text>
  <rect x="338" y="228" width="90" height="20" rx="10" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.22)" stroke-width="1"/>
  <text x="383" y="242" text-anchor="middle" font-size="10" fill="#60a5fa">Persuasive</text>
  <rect x="436" y="228" width="80" height="20" rx="10" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.18)" stroke-width="1"/>
  <text x="476" y="242" text-anchor="middle" font-size="10" fill="#93c5fd">Confident</text>

  <!-- Follow-up -->
  <rect x="600" y="105" width="260" height="155" rx="14" fill="url(#pG)" stroke="rgba(34,197,94,0.2)" stroke-width="1" filter="url(#sh)"/>
  <rect x="600" y="105" width="260" height="4" rx="2" fill="#22c55e"/>
  <text x="730" y="148" text-anchor="middle" font-size="28">🔄</text>
  <text x="730" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#f0e8ff">Follow-Up</text>
  <text x="730" y="198" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">After meetings, interviews,</text>
  <text x="730" y="214" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">proposals and applications</text>
  <rect x="618" y="228" width="85" height="20" rx="10" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.22)" stroke-width="1"/>
  <text x="660" y="242" text-anchor="middle" font-size="10" fill="#4ade80">Friendly</text>
  <rect x="711" y="228" width="75" height="20" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.18)" stroke-width="1"/>
  <text x="748" y="242" text-anchor="middle" font-size="10" fill="#86efac">Brief</text>

  <!-- Apology -->
  <rect x="880" y="105" width="280" height="155" rx="14" fill="url(#pG)" stroke="rgba(251,191,36,0.2)" stroke-width="1" filter="url(#sh)"/>
  <rect x="880" y="105" width="280" height="4" rx="2" fill="#fbbf24"/>
  <text x="1020" y="148" text-anchor="middle" font-size="28">🤝</text>
  <text x="1020" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#f0e8ff">Apology &amp; Resolution</text>
  <text x="1020" y="198" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">Customer complaints, mistakes,</text>
  <text x="1020" y="214" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">delays and service failures</text>
  <rect x="898" y="228" width="80" height="20" rx="10" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.22)" stroke-width="1"/>
  <text x="938" y="242" text-anchor="middle" font-size="10" fill="#fbbf24">Sincere</text>
  <rect x="986" y="228" width="100" height="20" rx="10" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.18)" stroke-width="1"/>
  <text x="1036" y="242" text-anchor="middle" font-size="10" fill="#fde68a">Empathetic</text>

  <!-- Row 2 -->
  <!-- Thank you -->
  <rect x="40" y="285" width="260" height="155" rx="14" fill="url(#pG)" stroke="rgba(244,114,182,0.2)" stroke-width="1" filter="url(#sh)"/>
  <rect x="40" y="285" width="260" height="4" rx="2" fill="#f472b6"/>

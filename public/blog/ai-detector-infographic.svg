<svg viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#0d0520"/><stop offset="100%" stop-color="#07070f"/></radialGradient>
    <radialGradient id="gT" cx="50%" cy="0%" r="60%"><stop offset="0%" stop-color="#5b21b6" stop-opacity="0.25"/><stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/></radialGradient>
    <radialGradient id="gB" cx="50%" cy="100%" r="60%"><stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="bG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#130b2e" stop-opacity="0.97"/><stop offset="100%" stop-color="#0c0820" stop-opacity="0.97"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#5b21b6" flood-opacity="0.3"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>
  <ellipse cx="450" cy="0" rx="500" ry="400" fill="url(#gT)"/>
  <ellipse cx="450" cy="1200" rx="500" ry="400" fill="url(#gB)"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="130" fill="rgba(124,58,237,0.08)"/>
  <line x1="0" y1="130" x2="900" y2="130" stroke="rgba(167,139,250,0.14)" stroke-width="1"/>
  <text x="450" y="52" text-anchor="middle" font-size="13" font-weight="700" fill="#a78bfa" letter-spacing="1.5">AI DETECTOR GUIDE 2026</text>
  <text x="450" y="90" text-anchor="middle" font-size="34" font-weight="900" fill="url(#aG)" filter="url(#glow)">The Complete AI</text>
  <text x="450" y="122" text-anchor="middle" font-size="34" font-weight="900" fill="url(#aG)" filter="url(#glow)">Detection Cheatsheet</text>

  <!-- Stats row -->
  <rect x="30" y="150" width="256" height="100" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.18)" stroke-width="1" filter="url(#sh)"/>
  <text x="158" y="198" text-anchor="middle" font-size="36" font-weight="900" fill="url(#aG)">90%</text>
  <text x="158" y="222" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.5)">Detection accuracy</text>
  <text x="158" y="238" text-anchor="middle" font-size="11" fill="rgba(167,139,250,0.5)">on unedited AI text</text>

  <rect x="322" y="150" width="256" height="100" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.18)" stroke-width="1" filter="url(#sh)"/>
  <text x="450" y="198" text-anchor="middle" font-size="36" font-weight="900" fill="url(#aG)">&lt;3s</text>
  <text x="450" y="222" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.5)">Average result time</text>
  <text x="450" y="238" text-anchor="middle" font-size="11" fill="rgba(167,139,250,0.5)">industry-leading speed</text>

  <rect x="614" y="150" width="256" height="100" rx="14" fill="url(#pG)" stroke="rgba(167,139,250,0.18)" stroke-width="1" filter="url(#sh)"/>
  <text x="742" y="198" text-anchor="middle" font-size="36" font-weight="900" fill="url(#aG)">50+</text>
  <text x="742" y="222" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.5)">Languages supported</text>
  <text x="742" y="238" text-anchor="middle" font-size="11" fill="rgba(167,139,250,0.5)">multilingual detection</text>

  <!-- Divider label -->
  <text x="450" y="288" text-anchor="middle" font-size="12" font-weight="700" fill="#a78bfa" letter-spacing="1">HOW TO USE THE AI DETECTOR — STEP BY STEP</text>
  <line x1="30" y1="296" x2="420" y2="296" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <line x1="480" y1="296" x2="870" y2="296" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>

  <!-- Steps -->
  <!-- Step 1 -->
  <rect x="30" y="312" width="840" height="90" rx="12" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <rect x="30" y="312" width="6" height="90" rx="3" fill="url(#bG)"/>
  <circle cx="72" cy="357" r="22" fill="rgba(124,58,237,0.2)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <text x="72" y="364" text-anchor="middle" font-size="18" font-weight="900" fill="url(#aG)">1</text>
  <text x="114" y="347" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)">Open ToolNest AI Detector</text>
  <text x="114" y="367" font-size="12" fill="rgba(255,255,255,0.5)">No account needed. Works in any browser, on any device. Completely free.</text>
  <text x="114" y="385" font-size="11" fill="rgba(167,139,250,0.55)">toolnestai.net/ai-tools/ai-detector</text>

  <!-- Step 2 -->
  <rect x="30" y="416" width="840" height="90" rx="12" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <rect x="30" y="416" width="6" height="90" rx="3" fill="url(#bG)"/>
  <circle cx="72" cy="461" r="22" fill="rgba(124,58,237,0.2)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <text x="72" y="468" text-anchor="middle" font-size="18" font-weight="900" fill="url(#aG)">2</text>
  <text x="114" y="451" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)">Paste Your Text</text>
  <text x="114" y="471" font-size="12" fill="rgba(255,255,255,0.5)">Copy and paste the content you want to check — articles, essays, emails, reports.</text>
  <text x="114" y="489" font-size="11" fill="rgba(167,139,250,0.55)">Supports up to 10,000 characters per request</text>

  <!-- Step 3 -->
  <rect x="30" y="520" width="840" height="90" rx="12" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <rect x="30" y="520" width="6" height="90" rx="3" fill="url(#bG)"/>
  <circle cx="72" cy="565" r="22" fill="rgba(124,58,237,0.2)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <text x="72" y="572" text-anchor="middle" font-size="18" font-weight="900" fill="url(#aG)">3</text>
  <text x="114" y="555" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)">Select Detection Model</text>
  <text x="114" y="575" font-size="12" fill="rgba(255,255,255,0.5)">Choose GPT-4, ChatGPT, Claude, Gemini, Llama, PaLM 2, Mistral or Custom.</text>
  <text x="114" y="593" font-size="11" fill="rgba(167,139,250,0.55)">Match the model to the source you suspect</text>

  <!-- Step 4 -->
  <rect x="30" y="624" width="840" height="90" rx="12" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <rect x="30" y="624" width="6" height="90" rx="3" fill="url(#bG)"/>
  <circle cx="72" cy="669" r="22" fill="rgba(124,58,237,0.2)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <text x="72" y="676" text-anchor="middle" font-size="18" font-weight="900" fill="url(#aG)">4</text>
  <text x="114" y="659" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)">Click "Detect AI Content"</text>
  <text x="114" y="679" font-size="12" fill="rgba(255,255,255,0.5)">The AI analyzes patterns, perplexity and burstiness. Results appear in under 3 seconds.</text>
  <text x="114" y="697" font-size="11" fill="rgba(167,139,250,0.55)">Real-time confidence score, verdict and probability breakdown</text>

  <!-- Step 5 -->
  <rect x="30" y="728" width="840" height="90" rx="12" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <rect x="30" y="728" width="6" height="90" rx="3" fill="url(#bG)"/>
  <circle cx="72" cy="773" r="22" fill="rgba(124,58,237,0.2)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <text x="72" y="780" text-anchor="middle" font-size="18" font-weight="900" fill="url(#aG)">5</text>
  <text x="114" y="763" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)">Read the Report &amp; Take Action</text>
  <text x="114" y="783" font-size="12" fill="rgba(255,255,255,0.5)">Review the AI percentage, per-sentence highlighting, and confidence level.</text>
  <text x="114" y="801" font-size="11" fill="rgba(167,139,250,0.55)">Download or copy the report for your records</text>

  <!-- Tips section -->
  <text x="450" y="858" text-anchor="middle" font-size="12" font-weight="700" fill="#a78bfa" letter-spacing="1">PRO TIPS FOR BETTER RESULTS</text>
  <line x1="30" y1="866" x2="380" y2="866" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <line x1="520" y1="866" x2="870" y2="866" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>

  <g font-size="12" fill="rgba(255,255,255,0.6)">
    <rect x="30" y="880" width="408" height="56" rx="10" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="50" y="904" fill="rgba(167,139,250,0.8)" font-weight="600">💡 Use enough text</text>
    <text x="50" y="922">Paste at least 150 words for reliable results.</text>

    <rect x="462" y="880" width="408" height="56" rx="10" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="482" y="904" fill="rgba(167,139,250,0.8)" font-weight="600">💡 Try multiple models</text>
    <text x="482" y="922">Run the text through GPT-4 and Claude for broader coverage.</text>

    <rect x="30" y="950" width="408" height="56" rx="10" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="50" y="974" fill="rgba(167,139,250,0.8)" font-weight="600">💡 Context is key</text>
    <text x="50" y="992">Provide full paragraphs, not isolated sentences.</text>

    <rect x="462" y="950" width="408" height="56" rx="10" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
    <text x="482" y="974" fill="rgba(167,139,250,0.8)" font-weight="600">💡 Never rely on one score</text>
    <text x="482" y="992">Use detection as evidence, not a verdict on its own.</text>
  </g>

  <!-- Footer CTA -->
  <rect x="30" y="1040" width="840" height="110" rx="16" fill="url(#bG)" filter="url(#sh)"/>
  <text x="450" y="1080" text-anchor="middle" font-size="22" font-weight="900" fill="#fff">Try the Free AI Detector Now</text>
  <text x="450" y="1104" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.7)">No sign-up · No limits · Instant results · 100% Free</text>
  <text x="450" y="1130" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.5)">toolnestai.net</text>

  <!-- Bottom brand -->
  <text x="450" y="1168" text-anchor="middle" font-size="11" fill="rgba(167,139,250,0.35)">ToolNest AI — Free AI, PDF &amp; Online Tools</text>
</svg>

<svg viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%"><stop offset="0%" stop-color="#0a0118"/><stop offset="100%" stop-color="#05030d"/></radialGradient>
    <radialGradient id="gT" cx="50%" cy="10%" r="50%"><stop offset="0%" stop-color="#5b21b6" stop-opacity="0.3"/><stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/></radialGradient>
    <radialGradient id="gB" cx="50%" cy="90%" r="50%"><stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="bG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#130b2e" stop-opacity="0.97"/><stop offset="100%" stop-color="#0c0820" stop-opacity="0.97"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#5b21b6" flood-opacity="0.3"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="neon"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>
  <ellipse cx="450" cy="180" rx="500" ry="350" fill="url(#gT)"/>
  <ellipse cx="450" cy="1050" rx="500" ry="300" fill="url(#gB)"/>

  <!-- HEADER -->
  <text x="450" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="1.5">TOOLNEST AI</text>
  <text x="450" y="96" text-anchor="middle" font-size="38" font-weight="900" fill="url(#aG)" filter="url(#glow)">AI Cover Letter</text>
  <text x="450" y="138" text-anchor="middle" font-size="38" font-weight="900" fill="url(#aG)" filter="url(#glow)">Generator</text>
  <text x="450" y="170" text-anchor="middle" font-size="15" fill="rgba(255,255,255,0.5)">The complete guide to writing job-winning letters with AI</text>
  <line x1="100" y1="186" x2="800" y2="186" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>

  <!-- STAT STRIP -->
  <rect x="28" y="196" width="844" height="68" rx="12" fill="url(#pG)" stroke="rgba(167,139,250,0.18)" stroke-width="1"/>
  <g text-anchor="middle">
    <text x="155" y="222" font-size="22" font-weight="900" fill="url(#aG)">75%</text>
    <text x="155" y="240" font-size="9" fill="rgba(255,255,255,0.42)">resumes rejected</text>
    <text x="155" y="254" font-size="9" fill="rgba(255,255,255,0.42)">by ATS first</text>
    <line x1="280" y1="204" x2="280" y2="256" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="378" y="222" font-size="22" font-weight="900" fill="url(#aG)">30 sec</text>
    <text x="378" y="240" font-size="9" fill="rgba(255,255,255,0.42)">average recruiter</text>
    <text x="378" y="254" font-size="9" fill="rgba(255,255,255,0.42)">reads cover letter</text>
    <line x1="500" y1="204" x2="500" y2="256" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="600" y="222" font-size="22" font-weight="900" fill="url(#aG)">3×</text>
    <text x="600" y="240" font-size="9" fill="rgba(255,255,255,0.42)">more interview</text>
    <text x="600" y="254" font-size="9" fill="rgba(255,255,255,0.42)">calls with tailored letter</text>
    <line x1="720" y1="204" x2="720" y2="256" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="800" y="222" font-size="22" font-weight="900" fill="url(#aG)">&lt;60s</text>
    <text x="800" y="240" font-size="9" fill="rgba(255,255,255,0.42)">to generate with</text>
    <text x="800" y="254" font-size="9" fill="rgba(255,255,255,0.42)">ToolNest AI</text>
  </g>

  <!-- SECTION 1: Why cover letters still matter -->
  <text x="450" y="296" text-anchor="middle" font-size="14" font-weight="800" fill="url(#aG)">① Why Cover Letters Still Matter in 2026</text>
  <rect x="28" y="306" width="844" height="110" rx="12" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <g font-size="10" fill="rgba(255,255,255,0.5)">
    <text x="50" y="330">Despite the rise of AI tools and one-click apply buttons, a strong cover letter remains the #1 differentiator between</text>
    <text x="50" y="348">candidates with similar CVs. Recruiters confirm that a personalised letter signals effort, communication skills and</text>
    <text x="50" y="366">genuine interest — three qualities that cannot be inferred from bullet points alone.</text>
    <text x="50" y="392">→ 49% of hiring managers say a great cover letter would cause them to hire a candidate over a stronger CV</text>
    <text x="50" y="408">→ 83% of recruiters say a cover letter tailored to the company has significant positive impact</text>
  </g>

  <!-- SECTION 2: 5-Step process -->
  <text x="450" y="448" text-anchor="middle" font-size="14" font-weight="800" fill="url(#aG)">② How to Write a Cover Letter with AI — 5 Steps</text>

  <!-- Steps vertical -->
  <g>
    <!-- Step 1 -->
    <circle cx="64" cy="490" r="20" fill="url(#bG)" filter="url(#sh)"/>
    <text x="64" y="496" text-anchor="middle" font-size="14" font-weight="900" fill="#fff">1</text>
    <line x1="64" y1="510" x2="64" y2="560" stroke="rgba(167,139,250,0.25)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="96" y="468" width="776" height="54" rx="10" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
    <text x="116" y="490" font-size="12" font-weight="700" fill="#a78bfa">Enter Your Information</text>
    <text x="116" y="508" font-size="10" fill="rgba(255,255,255,0.45)">Name, email, phone, LinkedIn URL — the AI formats your contact details perfectly, every time.</text>

    <!-- Step 2 -->
    <circle cx="64" cy="570" r="20" fill="url(#bG)" filter="url(#sh)"/>
    <text x="64" y="576" text-anchor="middle" font-size="14" font-weight="900" fill="#fff">2</text>
    <line x1="64" y1="590" x2="64" y2="640" stroke="rgba(167,139,250,0.25)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="96" y="548" width="776" height="54" rx="10" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
    <text x="116" y="570" font-size="12" font-weight="700" fill="#93c5fd">Add the Job Details</text>
    <text x="116" y="588" font-size="10" fill="rgba(255,255,255,0.45)">Job title, company name, industry. Paste key skills from the job listing for maximum ATS match.</text>

    <!-- Step 3 -->
    <circle cx="64" cy="650" r="20" fill="url(#bG)" filter="url(#sh)"/>
    <text x="64" y="656" text-anchor="middle" font-size="14" font-weight="900" fill="#fff">3</text>
    <line x1="64" y1="670" x2="64" y2="720" stroke="rgba(167,139,250,0.25)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="96" y="628" width="776" height="54" rx="10" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
    <text x="116" y="650" font-size="12" font-weight="700" fill="#c4b5fd">Click Generate</text>
    <text x="116" y="668" font-size="10" fill="rgba(255,255,255,0.45)">The AI produces a full, professional cover letter in under 60 seconds — structured, ATS-optimised, personalised.</text>

    <!-- Step 4 -->
    <circle cx="64" cy="730" r="20" fill="url(#bG)" filter="url(#sh)"/>
    <text x="64" y="736" text-anchor="middle" font-size="14" font-weight="900" fill="#fff">4</text>
    <line x1="64" y1="750" x2="64" y2="800" stroke="rgba(167,139,250,0.25)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="96" y="708" width="776" height="54" rx="10" fill="url(#pG)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
    <text x="116" y="730" font-size="12" font-weight="700" fill="#6ee7b7">Review and Personalise</text>
    <text x="116" y="748" font-size="10" fill="rgba(255,255,255,0.45)">Read through, add a specific detail about the company, and adjust tone if needed. Takes 2–3 minutes.</text>

    <!-- Step 5 -->
    <circle cx="64" cy="810" r="20" fill="url(#bG)" filter="url(#sh)"/>
    <text x="64" y="816" text-anchor="middle" font-size="14" font-weight="900" fill="#fff">5</text>
    <rect x="96" y="788" width="776" height="54" rx="10" fill="url(#pG)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
    <text x="116" y="810" font-size="12" font-weight="700" fill="#fde68a">Copy, Save and Apply</text>
    <text x="116" y="828" font-size="10" fill="rgba(255,255,255,0.45)">One-click copy. Paste into your application. Repeat for every job — a new tailored letter every time.</text>
  </g>

  <!-- SECTION 3: Common mistakes -->
  <text x="450" y="884" text-anchor="middle" font-size="14" font-weight="800" fill="url(#aG)">③ 5 Cover Letter Mistakes AI Prevents</text>
  <g>
    <rect x="28" y="894" width="404" height="56" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <text x="48" y="914" font-size="11" font-weight="700" fill="rgba(239,68,68,0.8)">✗ Generic opening line</text>
    <text x="48" y="930" font-size="9" fill="rgba(255,255,255,0.42)">"I am writing to apply for..." — AI opens with your strongest point</text>
    <rect x="468" y="894" width="404" height="56" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <text x="488" y="914" font-size="11" font-weight="700" fill="rgba(239,68,68,0.8)">✗ Wrong length</text>
    <text x="488" y="930" font-size="9" fill="rgba(255,255,255,0.42)">Too long or too short — AI targets the 150–250 word ATS sweet spot</text>
    <rect x="28" y="962" width="404" height="56" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <text x="48" y="982" font-size="11" font-weight="700" fill="rgba(239,68,68,0.8)">✗ Repeating the CV</text>
    <text x="48" y="998" font-size="9" fill="rgba(255,255,255,0.42)">Listing duties instead of achievements — AI frames everything as outcomes</text>
    <rect x="468" y="962" width="404" height="56" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <text x="488" y="982" font-size="11" font-weight="700" fill="rgba(239,68,68,0.8)">✗ No company reference</text>
    <text x="488" y="998" font-size="9" fill="rgba(255,255,255,0.42)">Skipping why this company — AI adds targeted company connection</text>
    <rect x="248" y="1030" width="404" height="56" rx="10" fill="url(#pG)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <text x="268" y="1050" font-size="11" font-weight="700" fill="rgba(239,68,68,0.8)">✗ Missing keywords</text>
    <text x="268" y="1066" font-size="9" fill="rgba(255,255,255,0.42)">No ATS optimisation — AI weaves every skill from your input naturally</text>
  </g>

  <!-- FOOTER CTA -->
  <rect x="28" y="1102" width="844" height="76" rx="14" fill="url(#bG)" filter="url(#sh)"/>
  <text x="450" y="1130" text-anchor="middle" font-size="18" font-weight="900" fill="#fff">Write Your Cover Letter Free — Right Now</text>
  <text x="450" y="1152" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.65)">No account. No subscription. Professional, ATS-optimised letter in under 60 seconds.</text>
  <text x="450" y="1170" text-anchor="middle" font-size="11" font-weight="700" fill="rgba(255,255,255,0.85)">toolnestai.net/ai-tools/ai-cover-letter-generator</text>
</svg>

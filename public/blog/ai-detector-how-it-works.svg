<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%"><stop offset="0%" stop-color="#0d0520"/><stop offset="100%" stop-color="#07070f"/></radialGradient>
    <radialGradient id="gL" cx="15%" cy="50%" r="45%"><stop offset="0%" stop-color="#5b21b6" stop-opacity="0.22"/><stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/></radialGradient>
    <radialGradient id="gR" cx="85%" cy="50%" r="45%"><stop offset="0%" stop-color="#2563eb" stop-opacity="0.16"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
    <linearGradient id="aG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="bG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#130b2e" stop-opacity="0.95"/><stop offset="100%" stop-color="#0c0820" stop-opacity="0.95"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#5b21b6" flood-opacity="0.3"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>
  <ellipse cx="150" cy="250" rx="400" ry="300" fill="url(#gL)"/>
  <ellipse cx="1050" cy="250" rx="400" ry="300" fill="url(#gR)"/>

  <!-- Section title -->
  <text x="600" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="#a78bfa" letter-spacing="1">HOW IT WORKS</text>
  <text x="600" y="82" text-anchor="middle" font-size="30" font-weight="800" fill="url(#aG)" filter="url(#glow)">How AI Detection Works</text>
  <text x="600" y="110" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.45)">Three intelligent stages that identify AI-generated content with high accuracy</text>

  <!-- Step 1: Input -->
  <rect x="50" y="148" width="300" height="300" rx="16" fill="url(#pG)" stroke="rgba(167,139,250,0.2)" stroke-width="1" filter="url(#sh)"/>
  <rect x="50" y="148" width="300" height="48" rx="16" fill="rgba(124,58,237,0.15)"/>
  <rect x="50" y="178" width="300" height="18" fill="rgba(124,58,237,0.15)"/>
  <text x="116" y="179" font-size="20">📝</text>
  <text x="150" y="179" font-size="14" font-weight="700" fill="url(#aG)">Step 1: Input Analysis</text>
  <!-- mini text lines -->
  <rect x="74" y="214" width="252" height="72" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="84" y="224" width="160" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
  <rect x="84" y="236" width="210" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="84" y="248" width="180" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="84" y="260" width="195" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="84" y="272" width="130" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  <!-- features -->
  <text x="74" y="314" font-size="11" fill="rgba(255,255,255,0.55)">✓  Text preprocessing &amp; tokenisation</text>
  <text x="74" y="334" font-size="11" fill="rgba(255,255,255,0.55)">✓  Language &amp; encoding detection</text>
  <text x="74" y="354" font-size="11" fill="rgba(255,255,255,0.55)">✓  Sentence boundary analysis</text>
  <text x="74" y="374" font-size="11" fill="rgba(255,255,255,0.55)">✓  Context window preparation</text>
  <text x="74" y="394" font-size="11" fill="rgba(255,255,255,0.55)">✓  Length &amp; complexity scoring</text>
  <text x="200" y="432" text-anchor="middle" font-size="10" fill="rgba(167,139,250,0.5)">~ &lt; 0.5 sec</text>

  <!-- Arrow 1 -->
  <line x1="360" y1="298" x2="420" y2="298" stroke="url(#aG)" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="420,293 432,298 420,303" fill="#a78bfa"/>

  <!-- Step 2: AI Model Analysis -->
  <rect x="438" y="148" width="324" height="300" rx="16" fill="url(#pG)" stroke="rgba(167,139,250,0.2)" stroke-width="1" filter="url(#sh)"/>
  <rect x="438" y="148" width="324" height="48" rx="16" fill="rgba(124,58,237,0.15)"/>
  <rect x="438" y="178" width="324" height="18" fill="rgba(124,58,237,0.15)"/>
  <text x="504" y="179" font-size="20">🤖</text>
  <text x="538" y="179" font-size="14" font-weight="700" fill="url(#aG)">Step 2: AI Model Analysis</text>
  <!-- Model badges -->
  <g font-size="10" font-weight="600" text-anchor="middle">
    <rect x="454" y="210" width="68" height="24" rx="6" fill="rgba(124,58,237,0.2)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="488" y="226" fill="#a78bfa">GPT-4</text>
    <rect x="530" y="210" width="72" height="24" rx="6" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
    <text x="566" y="226" fill="#60a5fa">ChatGPT</text>
    <rect x="610" y="210" width="60" height="24" rx="6" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <text x="640" y="226" fill="#c4b5fd">Claude</text>
    <rect x="678" y="210" width="68" height="24" rx="6" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
    <text x="712" y="226" fill="#6ee7b7">Gemini</text>
    <rect x="454" y="242" width="60" height="24" rx="6" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
    <text x="484" y="258" fill="#fde68a">Llama</text>
    <rect x="522" y="242" width="70" height="24" rx="6" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <text x="557" y="258" fill="#fca5a5">PaLM 2</text>
    <rect x="600" y="242" width="68" height="24" rx="6" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <text x="634" y="258" fill="#c4b5fd">Mistral</text>
    <rect x="676" y="242" width="70" height="24" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="711" y="258" fill="rgba(255,255,255,0.5)">Custom</text>
  </g>
  <!-- Analysis features -->
  <text x="454" y="304" font-size="11" fill="rgba(255,255,255,0.55)">✓  Pattern recognition &amp; perplexity scoring</text>
  <text x="454" y="324" font-size="11" fill="rgba(255,255,255,0.55)">✓  Burstiness &amp; uniformity analysis</text>
  <text x="454" y="344" font-size="11" fill="rgba(255,255,255,0.55)">✓  Sentence structure profiling</text>
  <text x="454" y="364" font-size="11" fill="rgba(255,255,255,0.55)">✓  Vocabulary diversity measurement</text>
  <text x="454" y="384" font-size="11" fill="rgba(255,255,255,0.55)">✓  Cross-model probability matrix</text>
  <text x="600" y="432" text-anchor="middle" font-size="10" fill="rgba(167,139,250,0.5)">~ 1–2 sec processing</text>

  <!-- Arrow 2 -->
  <line x1="772" y1="298" x2="832" y2="298" stroke="url(#aG)" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="832,293 844,298 832,303" fill="#a78bfa"/>

  <!-- Step 3: Results -->
  <rect x="850" y="148" width="300" height="300" rx="16" fill="url(#pG)" stroke="rgba(167,139,250,0.2)" stroke-width="1" filter="url(#sh)"/>
  <rect x="850" y="148" width="300" height="48" rx="16" fill="rgba(124,58,237,0.15)"/>
  <rect x="850" y="178" width="300" height="18" fill="rgba(124,58,237,0.15)"/>
  <text x="916" y="179" font-size="20">📊</text>
  <text x="950" y="179" font-size="14" font-weight="700" fill="url(#aG)">Step 3: Confidence Report</text>
  <!-- Gauge -->
  <circle cx="1000" cy="258" r="44" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
  <circle cx="1000" cy="258" r="44" fill="none" stroke="url(#aG)" stroke-width="8" stroke-dasharray="55 222" stroke-linecap="round" transform="rotate(-90 1000 258)"/>
  <text x="1000" y="250" text-anchor="middle" font-size="20" font-weight="900" fill="#a78bfa">18%</text>
  <text x="1000" y="268" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.4)">AI Generated</text>
  <text x="1000" y="286" text-anchor="middle" font-size="10" font-weight="700" fill="#4ade80">Human Written</text>
  <!-- Bars -->
  <g font-size="9">
    <text x="866" y="320" fill="rgba(255,255,255,0.45)">AI Generated</text>
    <rect x="956" y="311" width="100" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="956" y="311" width="18" height="6" rx="3" fill="url(#bG)"/>
    <text x="1062" y="320" fill="rgba(255,255,255,0.45)">18%</text>
    <text x="866" y="338" fill="rgba(255,255,255,0.45)">Possibly AI</text>
    <rect x="956" y="329" width="100" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="956" y="329" width="22" height="6" rx="3" fill="rgba(167,139,250,0.6)"/>
    <text x="1062" y="338" fill="rgba(255,255,255,0.45)">22%</text>
    <text x="866" y="356" fill="rgba(255,255,255,0.45)">Uncertain</text>
    <rect x="956" y="347" width="100" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="956" y="347" width="10" height="6" rx="3" fill="rgba(251,191,36,0.6)"/>
    <text x="1062" y="356" fill="rgba(255,255,255,0.45)">10%</text>
    <text x="866" y="374" fill="rgba(255,255,255,0.45)">Likely Human</text>
    <rect x="956" y="365" width="100" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="956" y="365" width="50" height="6" rx="3" fill="rgba(34,197,94,0.7)"/>
    <text x="1062" y="374" fill="rgba(255,255,255,0.45)">50%</text>
  </g>
  <text x="866" y="402" font-size="11" fill="rgba(255,255,255,0.55)">✓  Confidence score + verdict</text>
  <text x="1000" y="432" text-anchor="middle" font-size="10" fill="rgba(167,139,250,0.5)">~ instant</text>
</svg>
